    <style>
        /* CSS Nativo per caricamento istantaneo (Prima che React si avvii) */
        body { 
            background-color: #111827; 
            background-image: radial-gradient(circle at 50% 0%, #1f2937 0%, #111827 70%);
            margin: 0; padding: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; width: 100vw; color: white;
        }
        
        #loading-screen {
            position: fixed; inset: 0; background: #111827; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 99999; transition: opacity 0.4s ease;
        }
        
        .loader {
            width: 50px; height: 50px; border: 4px solid #374151; 
            border-top-color: #00D166; border-radius: 50%; 
            animation: spin 1s infinite cubic-bezier(0.55, 0.15, 0.45, 0.85);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 60% { transform: scale(1.02); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes flipIn { 0% { transform: rotateY(90deg) scale(1.1); opacity: 0; } 100% { transform: rotateY(0deg) scale(1); opacity: 1; } }
        @keyframes confettiFall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

        .animate-fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-pop-in { animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-flip-in { animation: flipIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-confetti { animation: confettiFall linear forwards; }
        
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        .animate-float { animation: float 3.5s ease-in-out infinite; }
        
        @keyframes shine { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        .animate-shine { 
            background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.05) 40%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.05) 60%, transparent 80%); 
            background-size: 200% auto; 
            animation: shine 3s linear infinite; 
        }

        /* Stili per la formattazione avanzata delle lezioni */

        .lesson-content .highlight-box {
            background: rgba(255,255,255,0.05); border-left: 3px solid #00D166;
            padding: 10px; margin: 12px 0; border-radius: 4px; font-size: 0.95em;
        }
        .lesson-content .math-box {
            background: rgba(46, 157, 223, 0.1); border: 1px solid rgba(46, 157, 223, 0.3);
            padding: 10px; margin: 12px 0; border-radius: 6px; font-family: monospace; font-size: 1.1em; color: #2E9DDF;
        }
        .lesson-content .memo-box {
            background: rgba(255, 184, 5, 0.1); border-left: 3px solid #FFB805;
            padding: 10px; margin: 12px 0; border-radius: 4px; font-style: italic; font-weight: 500;
        }
        .lesson-content hr { border-color: rgba(255,255,255,0.1); margin: 15px 0; }
        
        .backface-hidden { -webkit-backface-visibility: hidden; backface-visibility: hidden; transform: translateZ(0); }
        input[type="text"] { font-size: 16px !important; }

        .viewport-container { height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>

                Play: <path d="m7 4 12 8-12 8V4z" />,

                Trophy: <Fragment><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></Fragment>,

            return (

        const COLORS = { primary: '#1A1A1A', greenCorp: '#00D166', backBlue: '#2E9DDF', layPink: '#F48EAD', text: '#FFFFFF', boardBg: '#0F2027', gold: '#FFB805' };
        const QWERTY = [ ['Q','W','E','R','T','Y','U','I','O','P'], ['A','S','D','F','G','H','J','K','L'], ['Z','X','C','V','B','N','M'] ];

        const RANKS = [
            { max: 5, title: { it: 'Novellino', en: 'Rookie', es: 'Novato', pt: 'Novato' }, color: '#9CA3AF', icon: 'User' },
            { max: 10, title: { it: 'Punter', en: 'Punter', es: 'Apostador', pt: 'Apostador' }, color: '#3B82F6', icon: 'User' },
            { max: 15, title: { it: 'Apprendista', en: 'Apprentice', es: 'Aprendiz', pt: 'Aprendiz' }, color: '#10B981', icon: 'Lightbulb' },
            { max: 20, title: { it: 'Scalper', en: 'Scalper', es: 'Scalper', pt: 'Scalper' }, color: '#F59E0B', icon: 'Play' },
            { max: 25, title: { it: 'Market Maker', en: 'Market Maker', es: 'Market Maker', pt: 'Market Maker' }, color: '#8B5CF6', icon: 'CheckCircle' },
            { max: 31, title: { it: 'Exchange Master', en: 'Exchange Master', es: 'Maestro Exchange', pt: 'Mestre Exchange' }, color: '#EF4444', icon: 'Trophy' }
        ];

        /* DIZIONARIO PRO: 30 Lezioni estese e calcolate matematicamente */
        const phrasesDictionary = [
            { 
                id: 1, 
                it: { topic: "AZIONE BASE", phrase: "PUNTARE SULLA VITTORIA", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Significa scommettere <i>a favore</i> di un evento, credendo che accadrà.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Punti 10€ a quota 2.50.<br><div class='math-box'>Profitto = 10€ × (2.50 - 1) = +15€</div>• Vince: Recuperi 10€ + 15€ netti.<br>• Perde/Pareggia: Perdi 10€.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Il Punta è Azzurro: se vince incassi il malloppo.'</div>💡 <i>Pro Tip:</i> Compra sempre quote superiori alla probabilità reale (Value Bet)." }, 
                en: { topic: "BASIC ACTION", phrase: "BACKING THE WINNER", lesson: "🎯 <b>KEY CONCEPT:</b> Betting <i>for</i> an outcome to happen.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Back 10€ at odds of 2.50.<br><div class='math-box'>Profit = 10€ × (2.50 - 1) = +15€</div>• Wins: You get 10€ back + 15€ profit.<br>• Loses/Draws: You lose 10€.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Blue is Back: You buy the victory.'</div>💡 <i>Pro Tip:</i> Always buy odds higher than the true probability (Value Bet)." }, 
                es: { topic: "ACCIÓN BASE", phrase: "APOSTAR AL GANADOR", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Significa apostar <i>a favor</i> de un evento.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Apuestas 10€ a cuota 2.50.<br><div class='math-box'>Beneficio = 10€ × (2.50 - 1) = +15€</div>• Gana: Recuperas 10€ + 15€ netos.<br>• Pierde/Empata: Pierdes 10€.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'El Back es Azul: compras la victoria.'</div>💡 <i>Pro Tip:</i> Compra siempre cuotas superiores a la probabilidad real." }, 
                pt: { topic: "AÇÃO BASE", phrase: "APOSTAR NO VENCEDOR", lesson: "🎯 <b>CONCEITO CHAVE:</b> Significa apostar <i>a favor</i> de um evento.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Aposta 10€ a cota 2.50.<br><div class='math-box'>Lucro = 10€ × (2.50 - 1) = +15€</div>• Ganha: Recupera 10€ + 15€ líquidos.<br>• Perde/Empata: Perde 10€.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'O Back é Azul: compra a vitória.'</div>💡 <i>Pro Tip:</i> Compre sempre cotas superiores à probabilidade real." } 
            },
            { 
                id: 2, 
                it: { topic: "IL BANCO", phrase: "BANCARE IL PAREGGIO", lesson: "🎯 <b>CONCETTO CHIAVE:</b> La rivoluzione dell'Exchange. Significa scommettere <i>contro</i> un evento. Fai tu il Bookmaker!<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Banchi il pareggio a quota 3.00, accettando 10€ altrui.<br><div class='math-box'>Rischio = 10€ × (3.00 - 1) = 20€</div>• Se NON pareggiano: Vinci i 10€ altrui.<br>• Se pareggiano: Paghi 20€.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Il Banca è Rosa: vinci in due casi su tre.'</div>💡 <i>Pro Tip:</i> Bancare una quota alta espone a un rischio enorme. Banca quote basse (es. sotto 2.00)." }, 
                en: { topic: "THE BOOKIE", phrase: "LAYING THE DRAW", lesson: "🎯 <b>KEY CONCEPT:</b> The Exchange revolution. Betting <i>against</i> an outcome. You are the Bookie!<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Lay the draw at odds of 3.00, for a 10€ stake.<br><div class='math-box'>Risk = 10€ × (3.00 - 1) = 20€</div>• If NO draw: You win the 10€ stake.<br>• If draw: You pay 20€.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Pink is Lay: you win in two outcomes out of three.'</div>💡 <i>Pro Tip:</i> Laying high odds means massive risk. Lay low odds (under 2.00)." }, 
                es: { topic: "LA CASA", phrase: "LAY AL EMPATE", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Apostar <i>en contra</i> de un evento. ¡Eres el Bookmaker!<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Haces Lay al empate a cuota 3.00, por 10€.<br><div class='math-box'>Riesgo = 10€ × (3.00 - 1) = 20€</div>• Si NO hay empate: Ganas los 10€.<br>• Si hay empate: Pagas 20€.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'El Lay es Rosa: ganas en dos casos de tres.'</div>💡 <i>Pro Tip:</i> Hacer Lay a cuotas altas implica mucho riesgo. Haz Lay a cuotas bajas." }, 
                pt: { topic: "A CASA", phrase: "LAY AO EMPATE", lesson: "🎯 <b>CONCEITO CHAVE:</b> Apostar <i>contra</i> um evento. Você é o Bookmaker!<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Faz Lay ao empate a cota 3.00, por 10€.<br><div class='math-box'>Risco = 10€ × (3.00 - 1) = 20€</div>• Se NÃO houver empate: Ganha os 10€.<br>• Se houver empate: Paga 20€.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'O Lay é Rosa: ganha em dois casos de três.'</div>💡 <i>Pro Tip:</i> Fazer Lay a cotas altas implica muito risco. Faça Lay a cotas baixas." } 
            },
            { 
                id: 3, 
                it: { topic: "GESTIONE RISCHIO", phrase: "CALCOLO DELLA RESPONSABILITA", lesson: "🎯 <b>CONCETTO CHIAVE:</b> È il denaro che rischi <i>effettivamente</i> quando scegli di Bancare (Lay). Non è la somma che vuoi vincere!<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Vuoi vincere 50€ bancando a quota 5.00.<br><div class='math-box'>Responsabilità = 50€ × (5.00 - 1) = 200€</div>Rischieresti 200€ per vincerne 50€?</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Mai confondere la vincita con il rischio reale.'</div>💡 <i>Pro Tip:</i> Il sistema bloccherà l'ordine se la Responsabilità supera il saldo del tuo conto." }, 
                en: { topic: "RISK MANAGEMENT", phrase: "CALCULATE YOUR LIABILITY", lesson: "🎯 <b>KEY CONCEPT:</b> The actual money you risk when you Lay. It's NOT the amount you want to win!<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>You want to win 50€ laying at 5.00.<br><div class='math-box'>Liability = 50€ × (5.00 - 1) = 200€</div>Are you willing to risk 200€ to win 50€?</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Never confuse potential profit with actual risk.'</div>💡 <i>Pro Tip:</i> The system will block your bet if Liability exceeds your balance." }, 
                es: { topic: "GESTIÓN RIESGO", phrase: "CALCULAR LA RESPONSABILIDAD", lesson: "🎯 <b>CONCEPTO CLAVE:</b> El dinero que arriesgas realmente al hacer Lay. ¡No es lo que quieres ganar!<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Quieres ganar 50€ haciendo Lay a 5.00.<br><div class='math-box'>Responsabilidad = 50€ × (5.00 - 1) = 200€</div>¿Arriesgarías 200€ para ganar 50€?</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Nunca confundas la ganancia con el riesgo real.'</div>💡 <i>Pro Tip:</i> El sistema bloqueará tu apuesta si la Responsabilidad supera tu saldo." }, 
                pt: { topic: "GESTÃO DE RISCO", phrase: "CALCULAR A RESPONSABILIDADE", lesson: "🎯 <b>CONCEITO CHAVE:</b> O dinheiro que arrisca realmente ao fazer Lay. Não é o que quer ganhar!<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Quer ganhar 50€ fazendo Lay a 5.00.<br><div class='math-box'>Responsabilidade = 50€ × (5.00 - 1) = 200€</div>Arriscaria 200€ para ganhar 50€?</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Nunca confunda o lucro com o risco real.'</div>💡 <i>Pro Tip:</i> O sistema bloqueará a aposta se a Responsabilidade superar o seu saldo." } 
            },
            { 
                id: 4, 
                it: { topic: "USCITA ANTICIPATA", phrase: "USCITA CON CASH OUT", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Chiudere una posizione in profitto/perdita <i>prima</i> della fine, spalmando il risultato su tutti gli esiti.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>1. Punti 10€ a quota 3.00 (Vinci +20€).<br>2. Segnano, la quota scende a 1.50.<br>3. Banchi 20€ a quota 1.50.<br><div class='math-box'>Profitto Garantito = 10€ su OGNI risultato.</div></div><div class='memo-box'>🧠 <b>MEMO:</b> 'Chiudi la porta e porta i soldi a casa.'</div>💡 <i>Pro Tip:</i> Usa gli ordini manuali se il mercato è volatile; il tasto automatico può darti quote peggiori." }, 
                en: { topic: "EARLY EXIT", phrase: "EXIT WITH CASH OUT", lesson: "🎯 <b>KEY CONCEPT:</b> Closing a position in profit/loss <i>before</i> the end, spreading the result across all outcomes.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>1. Back 10€ at 3.00 (Win +20€).<br>2. Team scores, odds drop to 1.50.<br>3. Lay 20€ at 1.50.<br><div class='math-box'>Guaranteed Profit = 10€ on ANY result.</div></div><div class='memo-box'>🧠 <b>MEMO:</b> 'Lock the door and take the money home.'</div>💡 <i>Pro Tip:</i> Use manual orders if the market is volatile; the auto button can give worse odds." }, 
                es: { topic: "SALIDA TEMPRANA", phrase: "SALIDA CON CASH OUT", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Cerrar una posición <i>antes</i> del fin, repartiendo el resultado en todos los desenlaces.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>1. Back 10€ a 3.00 (Ganas +20€).<br>2. Marcan, cuota baja a 1.50.<br>3. Lay 20€ a 1.50.<br><div class='math-box'>Beneficio Garantizado = 10€ SIEMPRE.</div></div><div class='memo-box'>🧠 <b>MEMO:</b> 'Cierra la puerta y lleva el dinero a casa.'</div>💡 <i>Pro Tip:</i> Usa órdenes manuales si el mercado es volátil; el botón automático da peores precios." }, 
                pt: { topic: "SAÍDA ANTECIPADA", phrase: "SAIDA COM CASH OUT", lesson: "🎯 <b>CONCEITO CHAVE:</b> Fechar uma posição <i>antes</i> do fim, repartindo o resultado por todos os desfechos.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>1. Back 10€ a 3.00 (Ganha +20€).<br>2. Marcam, cota desce para 1.50.<br>3. Lay 20€ a 1.50.<br><div class='math-box'>Lucro Garantido = 10€ SEMPRE.</div></div><div class='memo-box'>🧠 <b>MEMO:</b> 'Feche a porta e leve o dinheiro para casa.'</div>💡 <i>Pro Tip:</i> Use ordens manuais se o mercado for volátil; o botão automático dá piores preços." } 
            },
            { 
                id: 5, 
                it: { topic: "TRADING DI BASE", phrase: "STRATEGIA BACK TO LAY", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Compri (Back) a una quota alta, aspetti che scenda e vendi (Lay) a quota inferiore per creare profitto.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Acquisti a 2.00, vendi a 1.30.<br><div class='math-box'>Spread = 70 Tick di puro vantaggio.</div>Il profitto nasce unicamente dalla differenza tra acquisto e vendita.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Compra in saldo, vendi a prezzo pieno.'</div>💡 <i>Pro Tip:</i> Se la tua squadra subisce un gol, la quota sale e dovrai incassare una perdita." }, 
                en: { topic: "BASIC TRADING", phrase: "BACK TO LAY STRATEGY", lesson: "🎯 <b>KEY CONCEPT:</b> Buy (Back) at high odds, wait for them to drop, and sell (Lay) at lower odds to create profit.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Buy at 2.00, sell at 1.30.<br><div class='math-box'>Spread = 70 Ticks of pure profit.</div>Profit comes solely from the difference between buy and sell prices.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Buy on sale, sell at full price.'</div>💡 <i>Pro Tip:</i> If your team concedes a goal, odds will rise and you must accept a loss." }, 
                es: { topic: "TRADING BÁSICO", phrase: "ESTRATEGIA BACK TO LAY", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Compras (Back) a cuota alta, esperas que baje y vendes (Lay) más barato para crear beneficio.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Compras a 2.00, vendes a 1.30.<br><div class='math-box'>Spread = 70 Ticks de ganancia pura.</div>El beneficio nace de la diferencia entre compra y venta.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Compra en rebajas, vende caro.'</div>💡 <i>Pro Tip:</i> Si tu equipo recibe gol, la cuota sube y deberás asumir una pérdida." }, 
                pt: { topic: "TRADING BÁSICO", phrase: "ESTRATEGIA BACK TO LAY", lesson: "🎯 <b>CONCEITO CHAVE:</b> Compra (Back) a cota alta, espera que desça e vende (Lay) mais barato para criar lucro.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Compra a 2.00, vende a 1.30.<br><div class='math-box'>Spread = 70 Ticks de lucro puro.</div>O lucro nasce da diferença entre compra e venda.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Compre em saldos, venda caro.'</div>💡 <i>Pro Tip:</i> Se a sua equipa sofrer golo, a cota sobe e terá de assumir uma perda." } 
            },
            { 
                id: 6, 
                it: { topic: "MOVIMENTO QUOTA", phrase: "IL VALORE DEL TICK", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Il 'Tick' è l'unità minima del movimento di quota sull'Exchange. Cruciale per lo Scalping.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Le quote cambiano in modo asimmetrico:<br>• Da 1.01 a 2.00 → 1 tick = <b>0.01</b><br>• Da 2.00 a 3.00 → 1 tick = <b>0.02</b><br>• Da 3.00 a 4.00 → 1 tick = <b>0.05</b></div><div class='memo-box'>🧠 <b>MEMO:</b> 'Più la quota sale, più i salti sono ampi.'</div>💡 <i>Pro Tip:</i> Fare scalping sotto quota 2.00 è più stabile, perché serve molto più denaro per muovere la quota." }, 
                en: { topic: "ODDS MOVEMENT", phrase: "THE VALUE OF A TICK", lesson: "🎯 <b>KEY CONCEPT:</b> A 'Tick' is the minimum odds movement unit on the Exchange. Crucial for Scalping.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Odds don't increment equally:<br>• 1.01 to 2.00 → 1 tick = <b>0.01</b><br>• 2.00 to 3.00 → 1 tick = <b>0.02</b><br>• 3.00 to 4.00 → 1 tick = <b>0.05</b></div><div class='memo-box'>🧠 <b>MEMO:</b> 'The higher the odds, the bigger the jump.'</div>💡 <i>Pro Tip:</i> Scalping under 2.00 is more stable, as it requires much more money to move the market." }, 
                es: { topic: "MOVIMIENTO CUOTA", phrase: "EL VALOR DEL TICK", lesson: "🎯 <b>CONCEPTO CLAVE:</b> El 'Tick' es la unidad mínima de movimiento. Crucial para Scalping.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Los incrementos varían:<br>• 1.01 a 2.00 → 1 tick = <b>0.01</b><br>• 2.00 a 3.00 → 1 tick = <b>0.02</b><br>• 3.00 a 4.00 → 1 tick = <b>0.05</b></div><div class='memo-box'>🧠 <b>MEMO:</b> 'A más cuota, más largo es el salto.'</div>💡 <i>Pro Tip:</i> Hacer scalping bajo 2.00 es más estable, requiere mucho más dinero para moverse." }, 
                pt: { topic: "MOVIMIENTO COTA", phrase: "O VALOR DO TICK", lesson: "🎯 <b>CONCEITO CHAVE:</b> O 'Tick' é a unidade mínima de movimento. Crucial para Scalping.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Os incrementos variam:<br>• 1.01 a 2.00 → 1 tick = <b>0.01</b><br>• 2.00 a 3.00 → 1 tick = <b>0.02</b><br>• 3.00 a 4.00 → 1 tick = <b>0.05</b></div><div class='memo-box'>🧠 <b>MEMO:</b> 'Quanto maior a cota, maior o salto.'</div>💡 <i>Pro Tip:</i> Fazer scalping abaixo de 2.00 é mais estável, requer muito mais dinheiro para se mover." } 
            },
            { 
                id: 7, 
                it: { topic: "IL CAPITALE", phrase: "GESTIONE DEL BANKROLL", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Il capitale vitale del trader. La regola d'oro è 'non finire i soldi', non 'vincere tanto'.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Usa lo Staking Plan Percentuale.<br><div class='math-box'>Rischio Max = 1% o 2% del Capitale</div>Se hai 1000€, rischi max 20€ a operazione.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Proteggi la Cassa, e la Cassa proteggerà te.'</div>💡 <i>Pro Tip:</i> Perdere 10 trade di fila con questa regola ti lascerà comunque l'80% del capitale intatto." }, 
                en: { topic: "THE CAPITAL", phrase: "PRO BANKROLL MANAGEMENT", lesson: "🎯 <b>KEY CONCEPT:</b> The trader's lifeblood. The golden rule is 'don't go broke', not 'win big'.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Use Percentage Staking.<br><div class='math-box'>Max Risk = 1% to 2% of Bankroll</div>If you have 1000€, risk max 20€ per trade.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Protect the Bankroll, and it will protect you.'</div>💡 <i>Pro Tip:</i> Losing 10 trades in a row with this rule still leaves 80% of your capital intact." }, 
                es: { topic: "EL CAPITAL", phrase: "GESTION DEL BANKROLL", lesson: "🎯 <b>CONCEPTO CLAVE:</b> El capital vital. La regla de oro es 'no quebrar', no 'ganar mucho'.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Usa Stake Porcentual.<br><div class='math-box'>Riesgo Máx = 1% o 2% del Capital</div>Si tienes 1000€, arriesgas 20€ por trade.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Protege la Banca, y la Banca te protegerá a ti.'</div>💡 <i>Pro Tip:</i> Perder 10 trades seguidos con esta regla aún te deja el 80% del capital intacto." }, 
                pt: { topic: "O CAPITAL", phrase: "GESTAO DO BANKROLL", lesson: "🎯 <b>CONCEITO CHAVE:</b> O capital vital. A regra de ouro é 'não quebrar', não 'ganhar muito'.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Use Stake Percentual.<br><div class='math-box'>Risco Máx = 1% ou 2% do Capital</div>Se tem 1000€, arrisca 20€ por trade.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Proteja a Banca, e a Banca protegê-lo-á.'</div>💡 <i>Pro Tip:</i> Perder 10 trades seguidos com esta regra ainda lhe deixa 80% do capital intacto." } 
            },
            { 
                id: 8, 
                it: { topic: "TAGLIO PERDITE", phrase: "IMPOSTARE LO STOP LOSS", lesson: "🎯 <b>CONCETTO CHIAVE:</b> È il limite <i>inviolabile</i> di perdita massima. Raggiunto questo, esci dal mercato.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Entri su un Over 2.5.<br>Decidi uno Stop a -10 tick (es. perdita fissa 15€).<br><div class='math-box'>Tocchi -10 tick = Esegui Cash Out.</div>Nessuna esitazione, nessuna speranza di rimonta.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'La speranza non è una strategia di trading.'</div>💡 <i>Pro Tip:</i> Il trader perfetto accetta piccole perdite costanti per far vincere i grandi profitti a fine mese." }, 
                en: { topic: "CUTTING LOSSES", phrase: "SETTING A STOP LOSS", lesson: "🎯 <b>KEY CONCEPT:</b> The <i>unbreakable</i> maximum loss limit. Hit it, and you exit the market immediately.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>You back Over 2.5.<br>Set Stop at -10 ticks (e.g. 15€ fixed loss).<br><div class='math-box'>Hit -10 ticks = Execute Cash Out.</div>No hesitation, no hoping for a comeback.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Hope is not a trading strategy.'</div>💡 <i>Pro Tip:</i> The perfect trader accepts consistent small losses so big wins dominate the month's P&L." }, 
                es: { topic: "CORTAR PÉRDIDAS", phrase: "AJUSTAR EL STOP LOSS", lesson: "🎯 <b>CONCEPTO CLAVE:</b> El límite <i>inviolable</i> de pérdida. Lo tocas, sales del mercado.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Entras al Over 2.5.<br>Fijas Stop a -10 ticks (ej. pérdida 15€).<br><div class='math-box'>Tocas -10 ticks = Ejecutas Cash Out.</div>Sin dudar, sin esperar remontadas.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'La esperanza no es una estrategia de trading.'</div>💡 <i>Pro Tip:</i> El trader perfecto acepta pequeñas pérdidas para que los grandes lucros ganen el mes." }, 
                pt: { topic: "CORTAR PERDAS", phrase: "DEFINIR O STOP LOSS", lesson: "🎯 <b>CONCEITO CHAVE:</b> O limite <i>inviolável</i> de perda. Tocou, sai do mercado.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Entra no Over 2.5.<br>Fixa Stop a -10 ticks (ex. perda 15€).<br><div class='math-box'>Toca -10 ticks = Executa Cash Out.</div>Sem hesitar, sem esperar reviravoltas.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'A esperança não é uma estratégia de trading.'</div>💡 <i>Pro Tip:</i> O trader perfeito aceita pequenas perdas para que os grandes lucros ganhem o mês." } 
            },
            { 
                id: 9, 
                it: { topic: "L'ERRORE FATALE", phrase: "MAI INSEGUIRE LE PERDITE", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Piazzare scommesse irrazionali subito dopo una sconfitta per 'recuperare'. È la rovina del trader.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>1. Perdi 50€.<br>2. Punti subito 100€ (tilt mentale).<br><div class='math-box'>Rischio = Azzardare il 100% del Bankroll</div>Fine del conto in poche ore.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Se perdi la testa, hai già perso i soldi.'</div>💡 <i>Pro Tip:</i> Quando tocchi uno Stop Loss pesante, spegni il PC. Il mercato ci sarà anche domani." }, 
                en: { topic: "FATAL FLAW", phrase: "NEVER CHASE YOUR LOSSES", lesson: "🎯 <b>KEY CONCEPT:</b> Placing irrational bets immediately after a loss to 'win it back'. It destroys accounts.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>1. You lose 50€.<br>2. You bet 100€ instantly (mental tilt).<br><div class='math-box'>Risk = Gambling 100% of Bankroll</div>Account blown in hours.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'If you lose your head, you have already lost your money.'</div>💡 <i>Pro Tip:</i> Hit a hard Stop Loss? Turn off the PC. The market will be there tomorrow." }, 
                es: { topic: "EL ERROR FATAL", phrase: "NUNCA PERSEGUIR PERDIDAS", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Hacer apuestas irracionales tras una derrota para 'recuperar'. La ruina del trader.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>1. Pierdes 50€.<br>2. Apuestas 100€ de golpe (tilt).<br><div class='math-box'>Riesgo = Arriesgar 100% del Bankroll</div>Cuenta a cero en horas.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Si pierdes la cabeza, ya has perdido el dinero.'</div>💡 <i>Pro Tip:</i> Tras un duro Stop Loss, apaga el PC. El mercado seguirá mañana." }, 
                pt: { topic: "O ERRO FATAL", phrase: "NUNCA PERSEGUIR PERDAS", lesson: "🎯 <b>CONCEITO CHAVE:</b> Fazer apostas irracionais após uma derrota para 'recuperar'. A ruína do trader.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>1. Perde 50€.<br>2. Aposta 100€ de uma vez (tilt).<br><div class='math-box'>Risco = Arriscar 100% do Bankroll</div>Conta a zeros em horas.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Se perder a cabeça, já perdeu o dinheiro.'</div>💡 <i>Pro Tip:</i> Após um duro Stop Loss, desligue o PC. O mercado continuará amanhã." } 
            },
            { 
                id: 10, 
                it: { topic: "TASSA EXCHANGE", phrase: "COMMISSIONI SULLE VINCITE", lesson: "🎯 <b>CONCETTO CHIAVE:</b> L'Exchange offre quote pure al 100%, ma trattiene una percentuale (2-5%) <b>solo sul profitto netto</b>.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Vinci 100€ netti. Tassa al 5%.<br><div class='math-box'>Vincita Reale = 100€ - (100€ × 5%) = 95€</div>Se perdi (Red Book), paghi ZERO commissioni.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Paghi il biglietto solo se vince lo spettacolo.'</div>💡 <i>Pro Tip:</i> Le quote Exchange sono in media il 15% più alte, compensando ampiamente le commissioni." }, 
                en: { topic: "EXCHANGE FEE", phrase: "COMMISSION ON NET WINS", lesson: "🎯 <b>KEY CONCEPT:</b> The Exchange has 100% true odds, but takes a fee (2-5%) <b>only on net profits</b>.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Win 100€ net. 5% commission rate.<br><div class='math-box'>Real Profit = 100€ - (100€ × 5%) = 95€</div>If you lose (Red Book), you pay ZERO commission.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'You only pay the ticket if the show wins.'</div>💡 <i>Pro Tip:</i> Exchange odds are typically 15% higher, massively offsetting the commission cost." }, 
                es: { topic: "TARIFA EXCHANGE", phrase: "COMISION EN GANANCIAS", lesson: "🎯 <b>CONCEPTO CLAVE:</b> El Exchange da cuotas reales 100%, pero cobra un % (2-5%) <b>solo sobre beneficio neto</b>.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Ganas 100€ netos. Comisión 5%.<br><div class='math-box'>Ganancia Real = 100€ - (100€ × 5%) = 95€</div>Si pierdes (Red Book), pagas CERO comisión.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Pagas la entrada solo si el show gana.'</div>💡 <i>Pro Tip:</i> Las cuotas Exchange son un 15% más altas, compensando de sobra la comisión." }, 
                pt: { topic: "TAXA EXCHANGE", phrase: "COMISSAO SOBRE GANHOS", lesson: "🎯 <b>CONCEITO CHAVE:</b> A Exchange dá cotas reais a 100%, mas cobra um % (2-5%) <b>só sobre lucro líquido</b>.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Ganha 100€ líquidos. Comissão 5%.<br><div class='math-box'>Ganho Real = 100€ - (100€ × 5%) = 95€</div>Se perder (Red Book), paga ZERO comissão.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Só paga o bilhete se o show ganhar.'</div>💡 <i>Pro Tip:</i> As cotas Exchange são 15% mais altas, compensando largamente a comissão." } 
            },
            { 
                id: 11, 
                it: { topic: "MULTISELEZIONE", phrase: "DIVIDERE IL RISCHIO CON IL DUTCHING", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Suddividere la propria puntata su più risultati possibili, garantendo lo stesso profitto indipendentemente da chi vince.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Vuoi scommettere 100€ su due cavalli (A e B).<br><div class='math-box'>Puntata A = (Quota B / Quota Tot) × 100€</div>Qualsiasi cavallo tagli il traguardo, l'utile netto sarà identico.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Non mettere mai tutte le uova in un solo paniere.'</div>💡 <i>Pro Tip:</i> Ottimo nei mercati Correct Score per coprire più risultati esatti." },
                en: { topic: "MULTI SELECTION", phrase: "DIVIDING RISK WITH DUTCHING", lesson: "🎯 <b>KEY CONCEPT:</b> Spreading your stake across multiple possible outcomes, guaranteeing the same profit regardless of the winner.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>You bet 100€ on two horses (A and B).<br><div class='math-box'>Stake A = (Odds B / Total Odds) × 100€</div>Whichever horse wins, the net profit is identical.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Never put all your eggs in one basket.'</div>💡 <i>Pro Tip:</i> Great in Correct Score markets to cover multiple exact results." },
                es: { topic: "MULTI SELECCIÓN", phrase: "DIVIDIR EL RIESGO CON DUTCHING", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Repartir tu apuesta en varios resultados, garantizando el mismo beneficio gane quien gane.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Apuestas 100€ en dos caballos (A y B).<br><div class='math-box'>Apuesta A = (Cuota B / Cuota Tot) × 100€</div>Cualquier caballo que gane dará el mismo lucro.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'No pongas todos los huevos en la misma cesta.'</div>💡 <i>Pro Tip:</i> Excelente en mercados Correct Score para cubrir varios resultados." },
                pt: { topic: "MULTI SELEÇÃO", phrase: "DIVIDIR O RISCO COM DUTCHING", lesson: "🎯 <b>CONCEITO CHAVE:</b> Distribuir a sua aposta por vários resultados, garantindo o mesmo lucro ganhe quem ganhar.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Aposta 100€ em dois cavalos (A e B).<br><div class='math-box'>Aposta A = (Cota B / Cota Tot) × 100€</div>Qualquer cavalo que ganhe dará o mesmo lucro.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Não ponha todos os ovos no mesmo cesto.'</div>💡 <i>Pro Tip:</i> Excelente em mercados Correct Score para cobrir vários resultados." }
            },
            { 
                id: 12, 
                it: { topic: "TRADING VELOCE", phrase: "FARE SCALPING SUI MERCATI", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Operazioni rapidissime (pochi secondi) per 'rubare' 1 o 2 tick di profitto alla volta, riducendo l'esposizione al minimo.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Entri con 1000€ a 1.50 ed esci a 1.49.<br><div class='math-box'>Guadagno per 1 tick = 10€</div>Lo ripeti 5 volte a partita senza aspettare i gol.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Tocca e fuggi, come un ladro silenzioso.'</div>💡 <i>Pro Tip:</i> Usa questa tecnica nei finali di partita, quando il tempo fa crollare le quote del pareggio." },
                en: { topic: "FAST TRADING", phrase: "SCALPING THE MARKETS QUICKLY", lesson: "🎯 <b>KEY CONCEPT:</b> Extremely fast trades (seconds) to 'steal' 1 or 2 ticks of profit at a time, minimizing exposure.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Enter with 1000€ at 1.50, exit at 1.49.<br><div class='math-box'>Profit per 1 tick = 10€</div>Repeat 5 times a match without waiting for goals.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Hit and run, like a silent thief.'</div>💡 <i>Pro Tip:</i> Use this late in games when time decay rapidly drops draw odds." },
                es: { topic: "TRADING RÁPIDO", phrase: "HACER SCALPING EN LOS MERCADOS", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Operaciones muy rápidas (segundos) para 'robar' 1 o 2 ticks de beneficio, reduciendo la exposición.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Entras con 1000€ a 1.50 y sales a 1.49.<br><div class='math-box'>Ganancia por 1 tick = 10€</div>Lo repites 5 veces sin esperar goles.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Toca y huye, como un ladrón silencioso.'</div>💡 <i>Pro Tip:</i> Úsalo al final del partido, cuando el tiempo hace caer las cuotas de empate." },
                pt: { topic: "TRADING RÁPIDO", phrase: "FAZER SCALPING NOS MERCADOS", lesson: "🎯 <b>CONCEITO CHAVE:</b> Operações muito rápidas (segundos) para 'roubar' 1 ou 2 ticks de lucro, reduzindo a exposição ao mínimo.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Entra com 1000€ a 1.50 e sai a 1.49.<br><div class='math-box'>Ganho por 1 tick = 10€</div>Repete 5 vezes sem esperar golos.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Toca e foge, como um ladrão silencioso.'</div>💡 <i>Pro Tip:</i> Use no final do jogo, quando o tempo faz cair as cotas de empate." }
            },
            { 
                id: 13, 
                it: { topic: "MARGINE OCCULTO", phrase: "IL MARGINE DEL BOOKMAKER", lesson: "🎯 <b>CONCETTO CHIAVE:</b> L'Overround. I bookmaker non offrono mai quote reali, ma le abbassano per garantisti un vantaggio matematico.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>La probabilità reale di un testa o croce è 50% (Quota 2.00).<br><div class='math-box'>Il Bookmaker ti offrirà quota 1.90</div>Nel lungo periodo, quel 0.10 garantisce il loro profitto e la tua perdita.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Il banco vince sempre perché trucca le probabilità.'</div>💡 <i>Pro Tip:</i> Nell'Exchange giochi contro altre persone: l'overround è vicino allo zero (100% di equità)." },
                en: { topic: "HIDDEN MARGIN", phrase: "THE BOOKMAKER OVERROUND", lesson: "🎯 <b>KEY CONCEPT:</b> The Overround. Bookies never offer true odds; they lower them to guarantee a mathematical edge.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>True probability of a coin toss is 50% (Odds 2.00).<br><div class='math-box'>The Bookie offers you 1.90</div>Over the long term, that 0.10 guarantees their profit and your loss.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'The house always wins because they rig the math.'</div>💡 <i>Pro Tip:</i> In the Exchange you bet against peers: overround is near zero (100% fair)." },
                es: { topic: "MARGEN OCULTO", phrase: "EL MARGEN DEL BOOKMAKER", lesson: "🎯 <b>CONCEPTO CLAVE:</b> El Overround. Las casas nunca dan cuotas reales, las bajan para tener ventaja matemática.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Probabilidad real de cara/cruz es 50% (Cuota 2.00).<br><div class='math-box'>El Bookie te ofrece 1.90</div>A largo plazo, ese 0.10 asegura su ganancia y tu pérdida.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'La banca siempre gana porque trucca las cuotas.'</div>💡 <i>Pro Tip:</i> En el Exchange juegas contra otros: el overround es casi nulo (100% justo)." },
                pt: { topic: "MARGEM OCULTA", phrase: "A MARGEM DO BOOKMAKER", lesson: "🎯 <b>CONCEITO CHAVE:</b> O Overround. As casas nunca dão cotas reais, baixam-nas para ter vantagem matemática.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Probabilidade real de cara/coroa é 50% (Cota 2.00).<br><div class='math-box'>O Bookie oferece-lhe 1.90</div>A longo prazo, esse 0.10 garante o lucro deles e a sua perda.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'A banca ganha sempre porque vicia as cotas.'</div>💡 <i>Pro Tip:</i> Na Exchange joga contra outros: o overround é quase nulo (100% justo)." }
            },
            { 
                id: 14, 
                it: { topic: "SOLDI NEL MERCATO", phrase: "LIQUIDITA DEL MERCATO", lesson: "🎯 <b>CONCETTO CHIAVE:</b> La quantità di denaro reale disponibile e già abbinato su un determinato evento sportivo.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Piazzare 1.000€ su un mercato con 10.000€ di liquidità creerà sbalzi di quota.<br><div class='math-box'>Piazzarli su 1.000.000€ sarà invisibile.</div>Più soldi ci sono, più è facile entrare e uscire.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Non tuffarti in una piscina senza acqua.'</div>💡 <i>Pro Tip:</i> Evita campionati minori con bassa liquidità: potresti rimanere incastrato senza riuscire a fare Cash Out." },
                en: { topic: "MARKET MONEY", phrase: "MARKET LIQUIDITY VOLUMES", lesson: "🎯 <b>KEY CONCEPT:</b> The amount of real, matched money available on a specific sports event.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Placing 1,000€ in a market with 10,000€ liquidity will cause odds to spike.<br><div class='math-box'>Placing it in 1,000,000€ is invisible.</div>More money means easier entry and exit.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Don't dive into a pool with no water.'</div>💡 <i>Pro Tip:</i> Avoid minor leagues with low liquidity: you might get stuck without being able to Cash Out." },
                es: { topic: "DINERO DEL MERCADO", phrase: "VOLUMENES DE LIQUIDEZ", lesson: "🎯 <b>CONCEPTO CLAVE:</b> La cantidad de dinero real y ya igualado en un evento deportivo.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Meter 1.000€ en un mercado de 10.000€ causará saltos de cuota.<br><div class='math-box'>Meterlos en 1.000.000€ será invisible.</div>Más dinero = más fácil entrar y salir.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'No te tires a una piscina sin agua.'</div>💡 <i>Pro Tip:</i> Evita ligas menores con poca liquidez: podrías quedarte atrapado sin poder hacer Cash Out." },
                pt: { topic: "DINHEIRO DO MERCADO", phrase: "VOLUMES DE LIQUIDEZ", lesson: "🎯 <b>CONCEITO CHAVE:</b> A quantidade de dinheiro real e já correspondido num evento desportivo.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Meter 1.000€ num mercado de 10.000€ causará saltos de cota.<br><div class='math-box'>Metê-los em 1.000.000€ será invisível.</div>Mais dinheiro = mais fácil entrar e sair.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Não mergulhe numa piscina sem água.'</div>💡 <i>Pro Tip:</i> Evite ligas menores com pouca liquidez: pode ficar preso sem conseguir fazer Cash Out." }
            },
            { 
                id: 15, 
                it: { topic: "ATTESA SUL MERCATO", phrase: "ORDINE NON ABBINATO", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Una scommessa lanciata sul mercato a una quota che attualmente nessuno è disposto ad accettare.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>La quota attuale è 2.00, ma tu richiedi quota 2.50.<br><div class='math-box'>L'ordine rimane in attesa (Unmatched).</div>Se il mercato non arriva mai a 2.50, i soldi ti verranno rimborsati a fine partita.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Butta l'amo e aspetta che il pesce abbocchi.'</div>💡 <i>Pro Tip:</i> È fondamentale per preparare le uscite: imposta i tuoi target di profitto molto prima che vengano raggiunti." },
                en: { topic: "WAITING IN MARKET", phrase: "UNMATCHED BET ORDER", lesson: "🎯 <b>KEY CONCEPT:</b> A bet thrown into the market at odds that no one is currently willing to accept.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Current odds are 2.00, but you request 2.50.<br><div class='math-box'>The order waits (Unmatched).</div>If the market never hits 2.50, the money is refunded at the end.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Throw the hook and wait for the fish to bite.'</div>💡 <i>Pro Tip:</i> Essential for preparing exits: set your profit target odds way before they are actually reached." },
                es: { topic: "ESPERA EN MERCADO", phrase: "ORDEN NO IGUALADA", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Una apuesta lanzada a una cuota que nadie quiere aceptar por ahora.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>La cuota actual es 2.00, pero pides 2.50.<br><div class='math-box'>La orden queda en espera (Unmatched).</div>Si el mercado nunca llega a 2.50, se te reembolsa el dinero al final.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Lanza el anzuelo y espera a que el pez pique.'</div>💡 <i>Pro Tip:</i> Es vital para preparar salidas: fija tu objetivo de ganancia mucho antes de que llegue." },
                pt: { topic: "ESPERA NO MERCADO", phrase: "ORDEM NAO CORRESPONDIDA", lesson: "🎯 <b>CONCEITO CHAVE:</b> Uma aposta lançada a uma cota que ninguém quer aceitar por agora.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>A cota atual é 2.00, mas pede 2.50.<br><div class='math-box'>A ordem fica em espera (Unmatched).</div>Se o mercado nunca chegar a 2.50, o dinheiro é reembolsado no fim.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Lance o anzol e espere que o peixe morda.'</div>💡 <i>Pro Tip:</i> É vital para preparar saídas: fixe o seu objetivo de lucro muito antes de ele chegar." }
            },
            { 
                id: 16, 
                it: { topic: "VANTAGGIO MATEMATICO", phrase: "TROVARE LA VALUE BET", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Trovare quote che sono matematicamente superiori rispetto all'effettiva probabilità che l'evento accada.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Se stimi che una squadra abbia il 50% di possibilità di vincere, la sua quota reale dovrebbe essere 2.00 (100 / 50).<br><div class='math-box'>Se l'Exchange offre 2.20, hai trovato Valore.</div>Comprare costantemente Value Bet porta a profitto certo nel lungo periodo.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Non indovinare chi vince, trova il prezzo sbagliato.'</div>💡 <i>Pro Tip:</i> Usa statistiche storiche per calcolare le tue quote 'ideali' prima di guardare quelle del mercato." },
                en: { topic: "MATHEMATICAL EDGE", phrase: "FINDING THE VALUE BET", lesson: "🎯 <b>KEY CONCEPT:</b> Finding odds that are mathematically higher than the actual probability of the event occurring.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>If you estimate a team has a 50% chance to win, true odds are 2.00 (100 / 50).<br><div class='math-box'>If the Exchange offers 2.20, you found Value.</div>Consistently buying Value Bets guarantees long-term profit.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Don't guess the winner, find the wrong price.'</div>💡 <i>Pro Tip:</i> Use historical stats to calculate your 'ideal' odds before looking at the market." },
                es: { topic: "VENTAJA MATEMÁTICA", phrase: "ENCONTRAR LA VALUE BET", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Encontrar cuotas matemáticamente superiores a la probabilidad real del evento.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Si estimas un 50% de probabilidad, la cuota real es 2.00 (100 / 50).<br><div class='math-box'>Si el Exchange ofrece 2.20, tienes Valor.</div>Comprar Valor siempre da beneficio a largo plazo.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'No adivines quién gana, encuentra el precio erróneo.'</div>💡 <i>Pro Tip:</i> Usa estadísticas para calcular tus cuotas ideales antes de mirar el mercado." },
                pt: { topic: "VANTAGEM MATEMÁTICA", phrase: "ENCONTRAR A VALUE BET", lesson: "🎯 <b>CONCEITO CHAVE:</b> Encontrar cotas matematicamente superiores à probabilidade real do evento.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Se estima 50% de probabilidade, a cota real é 2.00 (100 / 50).<br><div class='math-box'>Se a Exchange oferece 2.20, tem Valor.</div>Comprar Valor sempre dá lucro a longo prazo.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Não adivinhe quem ganha, encontre o preço errado.'</div>💡 <i>Pro Tip:</i> Use estatísticas para calcular as suas cotas ideais antes de olhar para o mercado." }
            },
            { 
                id: 17, 
                it: { topic: "TRADING INVERSO", phrase: "STRATEGIA LAY TO BACK", lesson: "🎯 <b>CONCETTO CHIAVE:</b> L'opposto della tecnica base. Banchi a quota bassa aspettando che la quota salga col tempo, per poi puntare (coprirti) a quota più alta.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Banchi il Pareggio (0-0) a inizio gara a 3.00.<br><div class='math-box'>Il tempo passa, arriva un goal. La quota schizza a 6.00.</div>Punti a 6.00 e intaschi un mega-profitto con rischio iniziale minimo.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Banca basso e vola alto.'</div>💡 <i>Pro Tip:</i> Perfetto contro le squadre super-favorite in svantaggio o sulle quote del pareggio." },
                en: { topic: "REVERSE TRADING", phrase: "LAY TO BACK STRATEGY", lesson: "🎯 <b>KEY CONCEPT:</b> The opposite of basic trading. Lay low odds expecting them to drift higher over time, then back to cover.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Lay the Draw (0-0) at kick-off at 3.00.<br><div class='math-box'>Time passes, a goal is scored. Odds skyrocket to 6.00.</div>Back at 6.00 to lock in a massive profit with minimal initial risk.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Lay low and fly high.'</div>💡 <i>Pro Tip:</i> Perfect against heavy favorites falling behind or for laying the draw." },
                es: { topic: "TRADING INVERSO", phrase: "ESTRATEGIA LAY TO BACK", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Lo opuesto a la base. Haces Lay a cuota baja esperando que suba, para luego hacer Back más alto.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Lay al Empate (0-0) al inicio a 3.00.<br><div class='math-box'>Hay un gol. La cuota se dispara a 6.00.</div>Haces Back a 6.00 y aseguras un mega-beneficio con poco riesgo inicial.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Haz Lay bajo y vuela alto.'</div>💡 <i>Pro Tip:</i> Perfecto contra súper-favoritos perdiendo o en el mercado de empate." },
                pt: { topic: "TRADING INVERSO", phrase: "ESTRATEGIA LAY TO BACK", lesson: "🎯 <b>CONCEITO CHAVE:</b> O oposto da base. Faz Lay a cota baixa esperando que suba, para depois fazer Back mais alto.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Lay ao Empate (0-0) no início a 3.00.<br><div class='math-box'>Há um golo. A cota dispara para 6.00.</div>Faz Back a 6.00 e garante um mega-lucro com pouco risco inicial.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Faça Lay baixo e voe alto.'</div>💡 <i>Pro Tip:</i> Perfeito contra super-favoritos a perder ou no mercado de empate." }
            },
            { 
                id: 18, 
                it: { topic: "RISCHIO ZERO", phrase: "ARBITRAGGIO SPORTIVO SUREBET", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Sfruttare le differenze di quota tra Bookmaker tradizionali ed Exchange per garantirsi un utile matematico certo, a rischio zero.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Bookmaker A offre il Segno 1 a 2.10.<br><div class='math-box'>Sull'Exchange puoi Bancare il Segno 1 a 1.95.</div>Puntando 100€ sul book e bancando sull'Exchange, avrai un margine matematico positivo su ogni esito.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Spremiti il bookmaker e copriti sull'Exchange.'</div>💡 <i>Pro Tip:</i> Attenzione ai limiti di puntata dei bookmaker, potrebbero bloccare il conto se lo fai troppo spesso." },
                en: { topic: "ZERO RISK", phrase: "SUREBET SPORTS ARBITRAGE", lesson: "🎯 <b>KEY CONCEPT:</b> Exploiting odds differences between traditional Bookies and the Exchange for guaranteed math profit.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Bookie A offers Team 1 at 2.10.<br><div class='math-box'>On the Exchange you can Lay Team 1 at 1.95.</div>Backing 100€ on the bookie and laying on the Exchange yields positive margin on any outcome.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Squeeze the bookie, cover on the Exchange.'</div>💡 <i>Pro Tip:</i> Beware of bookmaker stake limits; they might ban your account if done too often." },
                es: { topic: "RIESGO CERO", phrase: "ARBITRAJE DEPORTIVO SUREBET", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Explotar diferencias de cuota entre Bookies y Exchange para ganar matemáticamente sin riesgo.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Bookmaker A ofrece el Local a 2.10.<br><div class='math-box'>En el Exchange puedes hacer Lay al Local a 1.95.</div>Apostando 100€ en el bookie y haciendo Lay, tienes margen positivo siempre.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Exprime al bookmaker y cúbrete en el Exchange.'</div>💡 <i>Pro Tip:</i> Ojo a los límites de los bookies, pueden bloquear tu cuenta." },
                pt: { topic: "RISCO ZERO", phrase: "ARBITRAGEM DESPORTIVA SUREBET", lesson: "🎯 <b>CONCEITO CHAVE:</b> Explorar diferenças de cota entre Bookies e Exchange para ganhar matematicamente sem risco.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Bookmaker A oferece a Casa a 2.10.<br><div class='math-box'>Na Exchange pode fazer Lay à Casa a 1.95.</div>Apostando 100€ no bookie e fazendo Lay, tem margem positiva sempre.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Esprema o bookmaker e cubra-se na Exchange.'</div>💡 <i>Pro Tip:</i> Atenção aos limites dos bookies, podem bloquear a sua conta." }
            },
            { 
                id: 19, 
                it: { topic: "PUNTI CHIAVE", phrase: "LIVELLO DI SUPPORTO E RESISTENZA", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Prezzi (quote) storici su cui il mercato fatica a scendere (supporto) o a salire (resistenza) a causa di enormi volumi di denaro.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>La quota scende e sbatte contro 2.00 per tre volte senza superarlo.<br><div class='math-box'>Quota 2.00 = Supporto di Granito.</div>Piazzare un ordine Lay a 2.02 con Stop Loss a 1.98 ti dà un rapporto Rischio/Rendimento eccellente.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Il muro di gomma rimbalza sempre i prezzi.'</div>💡 <i>Pro Tip:</i> Le quote intere (2.00, 3.00, 4.00) agiscono psicologicamente come fortissime resistenze naturali." },
                en: { topic: "KEY POINTS", phrase: "SUPPORT AND RESISTANCE LEVELS", lesson: "🎯 <b>KEY CONCEPT:</b> Historic odds prices where the market struggles to drop (support) or rise (resistance) due to huge money volumes.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Odds drop and hit 2.00 three times without breaking.<br><div class='math-box'>Odds 2.00 = Granite Support.</div>Laying at 2.02 with Stop Loss at 1.98 gives excellent Risk/Reward ratio.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'The rubber wall always bounces prices back.'</div>💡 <i>Pro Tip:</i> Round odds (2.00, 3.00, 4.00) act psychologically as massive natural barriers." },
                es: { topic: "PUNTOS CLAVE", phrase: "NIVEL DE SOPORTE Y RESISTENCIA", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Cuotas históricas donde al mercado le cuesta bajar (soporte) o subir (resistencia) por gran volumen de dinero.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>La cuota cae y choca con 2.00 tres veces sin romper.<br><div class='math-box'>Cuota 2.00 = Soporte de Granito.</div>Hacer Lay a 2.02 con Stop en 1.98 da gran ratio Riesgo/Recompensa.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'El muro de goma siempre rebota los precios.'</div>💡 <i>Pro Tip:</i> Las cuotas redondas (2.00, 3.00) son barreras psicológicas masivas." },
                pt: { topic: "PONTOS CHAVE", phrase: "NIVEL DE SUPORTE E RESISTENCIA", lesson: "🎯 <b>CONCEITO CHAVE:</b> Cotas históricas onde ao mercado custa descer (suporte) ou subir (resistência) por grande volume de dinheiro.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>A cota cai e bate em 2.00 três vezes sem quebrar.<br><div class='math-box'>Cota 2.00 = Suporte de Granito.</div>Fazer Lay a 2.02 com Stop a 1.98 dá grande rácio Risco/Recompensa.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'O muro de borracha sempre rebate os preços.'</div>💡 <i>Pro Tip:</i> As cotas redondas (2.00, 3.00) são barreiras psicológicas massivas." }
            },
            { 
                id: 20, 
                it: { topic: "PRESSIONE MERCATO", phrase: "IL PESO DEL DENARO WOM", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Il Weight of Money (WoM) indica il rapporto tra il volume dei soldi in attesa di essere puntati e quelli per bancare.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Se il WoM lato Punta è 80% e lato Banca è 20%.<br><div class='math-box'>C'è 4 volte più pressione in acquisto!</div>La quota sarà matematicamente 'spinta' verso il basso nei successivi secondi.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'I soldi pesanti piegano le quote.'</div>💡 <i>Pro Tip:</i> Su betfair, il grafico del WoM è l'indicatore principe per gli scalper aggressivi pre-match." },
                en: { topic: "MARKET PRESSURE", phrase: "WEIGHT OF MONEY WOM INDICATOR", lesson: "🎯 <b>KEY CONCEPT:</b> The Weight of Money (WoM) shows the ratio between waiting Back volumes and waiting Lay volumes.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>If Back WoM is 80% and Lay is 20%.<br><div class='math-box'>There's 4x more buying pressure!</div>Odds will be mathematically 'pushed' downwards in the next seconds.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Heavy money bends the odds.'</div>💡 <i>Pro Tip:</i> On Betfair, the WoM chart is the primary indicator for aggressive pre-match scalpers." },
                es: { topic: "PRESIÓN MERCADO", phrase: "PESO DEL DINERO INDICADOR WOM", lesson: "🎯 <b>CONCEPTO CLAVE:</b> El Weight of Money (WoM) indica la proporción entre volúmenes en espera de Back y de Lay.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Si el WoM de Back es 80% y Lay es 20%.<br><div class='math-box'>¡Hay 4 veces más presión de compra!</div>La cuota será 'empujada' hacia abajo en segundos.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'El dinero pesado dobla las cuotas.'</div>💡 <i>Pro Tip:</i> En Betfair, el gráfico WoM es el indicador rey para scalpers pre-match." },
                pt: { topic: "PRESSÃO MERCADO", phrase: "PESO DO DINHEIRO INDICADOR WOM", lesson: "🎯 <b>CONCEITO CHAVE:</b> O Weight of Money (WoM) indica a proporção entre volumes em espera de Back e de Lay.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Se o WoM de Back é 80% e Lay é 20%.<br><div class='math-box'>Há 4 vezes mais pressão de compra!</div>A cota será 'empurrada' para baixo em segundos.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'O dinheiro pesado dobra as cotas.'</div>💡 <i>Pro Tip:</i> Na Betfair, o gráfico WoM é o indicador rei para scalpers pre-match." }
            },
            { 
                id: 21, 
                it: { topic: "IL FLUSSO", phrase: "SEGUIRE LA TENDENZA DEL MERCATO", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Il mercato è come un fiume: ha una direzione precisa. Operare contro il trend è la via più veloce per la rovina.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>La quota è scesa da 2.50 a 2.10 negli ultimi 10 minuti.<br><div class='math-box'>Trend = Fortemente Ribassista.</div>Bancare (sperando che salga) è un suicidio statistico, a meno che non ci siano eventi in campo che lo giustifichino.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Il trend è tuo amico. Cavalca l'onda, non farti travolgere.'</div>💡 <i>Pro Tip:</i> Un trend consolidato ha bisogno di una 'news' molto forte per invertirsi improvvisamente." },
                en: { topic: "THE FLOW", phrase: "FOLLOWING THE MARKET TREND", lesson: "🎯 <b>KEY CONCEPT:</b> The market is a river: it has a direction. Trading against the trend is the fastest path to ruin.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Odds dropped from 2.50 to 2.10 in 10 minutes.<br><div class='math-box'>Trend = Strongly Bearish.</div>Laying (hoping it rises) is statistical suicide, unless on-pitch events justify it.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'The trend is your friend. Ride the wave, don't fight it.'</div>💡 <i>Pro Tip:</i> A solid trend needs a very strong 'news' event to suddenly reverse." },
                es: { topic: "EL FLUJO", phrase: "SEGUIR LA TENDENCIA DEL MERCADO", lesson: "🎯 <b>CONCEPTO CLAVE:</b> El mercado es un río con dirección. Operar contra la tendencia es el camino rápido a la ruina.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>La cuota bajó de 2.50 a 2.10 en 10 min.<br><div class='math-box'>Tendencia = Fuerte a la Baja.</div>Hacer Lay es suicidio estadístico, a menos que algo en el campo lo justifique.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'La tendencia es tu amiga. Cabalga la ola.'</div>💡 <i>Pro Tip:</i> Una tendencia sólida necesita noticias fuertes para invertirse de golpe." },
                pt: { topic: "O FLUXO", phrase: "SEGUIR A TENDENCIA DO MERCADO", lesson: "🎯 <b>CONCEITO CHAVE:</b> O mercado é um rio com direção. Operar contra a tendência é o caminho rápido para a ruína.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>A cota desceu de 2.50 para 2.10 em 10 min.<br><div class='math-box'>Tendência = Forte em Baixa.</div>Fazer Lay é suicídio estatístico, a menos que algo no campo o justifique.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'A tendência é sua amiga. Apanhe a onda.'</div>💡 <i>Pro Tip:</i> Uma tendência sólida precisa de notícias fortes para se inverter de repente." }
            },
            { 
                id: 22, 
                it: { topic: "IL PREMATCH", phrase: "ANALISI DELLA QUOTA DI PARTENZA", lesson: "🎯 <b>CONCETTO CHIAVE:</b> La Quota di Partenza (Starting Price) contiene le aspettative globali di milioni di scommettitori prima del fischio d'inizio.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Apertura mercato: Quota a 2.50.<br><div class='math-box'>Fischio d'inizio: Quota a 1.90.</div>Questo crollo massiccio (-60 tick) indica informazioni vitali: formazioni sbilanciate, infortuni o volumi istituzionali.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'La partenza dice tutto su come finirà la corsa.'</div>💡 <i>Pro Tip:</i> Confronta sempre la quota attuale con quella di apertura di 24 ore prima per capire la vera forza di una squadra." },
                en: { topic: "THE PREMATCH", phrase: "STARTING PRICE ODDS ANALYSIS", lesson: "🎯 <b>KEY CONCEPT:</b> The Starting Price holds the global expectations of millions of bettors before kick-off.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Market open: Odds 2.50.<br><div class='math-box'>Kick-off: Odds 1.90.</div>This massive crash (-60 ticks) signals vital info: line-up changes, injuries, or smart money.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'The start tells you how the race will end.'</div>💡 <i>Pro Tip:</i> Always compare current odds with the opening odds from 24h prior to gauge true team strength." },
                es: { topic: "EL PREPARTIDO", phrase: "ANALISIS DE LA CUOTA INICIAL", lesson: "🎯 <b>CONCEPTO CLAVE:</b> La Cuota Inicial tiene las expectativas globales de millones de apostadores antes del silbato.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Apertura: Cuota 2.50.<br><div class='math-box'>Inicio del partido: Cuota 1.90.</div>Esta caída masiva (-60 ticks) indica info vital: alineaciones, lesiones o dinero inteligente.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'La salida te dice cómo acabará la carrera.'</div>💡 <i>Pro Tip:</i> Compara siempre la cuota actual con la de apertura 24h antes." },
                pt: { topic: "O PRÉ-JOGO", phrase: "ANALISE DA COTA DE PARTIDA", lesson: "🎯 <b>CONCEITO CHAVE:</b> A Cota Inicial tem as expectativas globais de milhões de apostadores antes do apito.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Abertura: Cota 2.50.<br><div class='math-box'>Início do jogo: Cota 1.90.</div>Esta queda massiva (-60 ticks) indica info vital: alinhamentos, lesões ou dinheiro inteligente.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'A partida diz como acabará a corrida.'</div>💡 <i>Pro Tip:</i> Compare sempre a cota atual com a de abertura 24h antes." }
            },
            { 
                id: 23, 
                it: { topic: "PROFITTO CERTO", phrase: "CREARE UN GREEN BOOK", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Il 'Libro Verde' è il Sacro Graal. Significa aver bilanciato perfettamente le uscite per avere profitto su *ogni* risultato possibile.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Vittoria = +15€ | Pareggio = +15€ | Sconfitta = +15€<br><div class='math-box'>Rischio totale rimanente = 0.00€</div>Hai isolato il profitto dalle variabili del gioco in campo.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Quando tutto è verde, puoi spegnere la TV e dormire felice.'</div>💡 <i>Pro Tip:</i> Non essere avido. Spalmare 50€ di profitto in tre caselle da 16€ è sempre meglio che rischiare per tenerne 50€ su un solo evento." },
                en: { topic: "GUARANTEED PROFIT", phrase: "CREATING A GREEN BOOK", lesson: "🎯 <b>KEY CONCEPT:</b> The 'Green Book' is the Holy Grail. Balancing exits perfectly to have profit on *every* possible outcome.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Win = +15€ | Draw = +15€ | Loss = +15€<br><div class='math-box'>Total remaining risk = 0.00€</div>You've isolated profit from on-pitch variables.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'When all is green, turn off the TV and sleep happy.'</div>💡 <i>Pro Tip:</i> Don't be greedy. Spreading a 50€ profit into three 16€ slots is always better than risking it all on one event." },
                es: { topic: "BENEFICIO SEGURO", phrase: "CREAR UN LIBRO VERDE", lesson: "🎯 <b>CONCEPTO CLAVE:</b> El 'Libro Verde' es el Grial. Equilibrar salidas para tener beneficio en *cualquier* resultado.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Gana = +15€ | Empata = +15€ | Pierde = +15€<br><div class='math-box'>Riesgo total restante = 0.00€</div>Has aislado tu lucro de las variables del juego.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Cuando todo es verde, apaga la TV y duerme feliz.'</div>💡 <i>Pro Tip:</i> No seas codicioso. Repartir 50€ en 3 cajas de 16€ es mejor que arriesgar por 50€ en una sola." },
                pt: { topic: "LUCRO GARANTIDO", phrase: "CRIAR UM LIVRO VERDE", lesson: "🎯 <b>CONCEITO CHAVE:</b> O 'Livro Verde' é o Graal. Equilibrar saídas para ter lucro em *qualquer* resultado.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Ganha = +15€ | Empata = +15€ | Perde = +15€<br><div class='math-box'>Risco total restante = 0.00€</div>Isolou o seu lucro das variáveis do jogo.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Quando tudo é verde, desligue a TV e durma feliz.'</div>💡 <i>Pro Tip:</i> Não seja ganancioso. Repartir 50€ em 3 caixas de 16€ é melhor que arriscar tudo numa só." }
            },
            { 
                id: 24, 
                it: { topic: "GESTIONE EMERGENZA", phrase: "COPERTURA DEL RISCHIO IN PLAY", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Fare 'Hedging'. È la manovra difensiva per limitare i danni quando la partita sta prendendo una brutta piega.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Hai puntato 100€ sull'Inter. Sta perdendo 1-0.<br><div class='math-box'>Banchi parzialmente a quota alta (es. 5.00).</div>Accetti una perdita calcolata di -30€ per scongiurare il -100€ se la partita finisce così.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Una nave rattoppata arriva in porto. Una nave che affonda, no.'</div>💡 <i>Pro Tip:</i> Le coperture si fanno in live osservando il match. Mai coprirsi se la propria squadra sta dominando fisicamente." },
                en: { topic: "EMERGENCY MGMT", phrase: "IN PLAY RISK HEDGING", lesson: "🎯 <b>KEY CONCEPT:</b> 'Hedging'. The defensive maneuver to limit damage when a match turns sour.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Backed 100€ on Inter. They trail 1-0.<br><div class='math-box'>Partially Lay at high odds (e.g. 5.00).</div>Accept a calculated -30€ loss to avoid a total -100€ wipeout.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'A patched ship reaches port. A sunken ship doesn't.'</div>💡 <i>Pro Tip:</i> Hedge live while watching. Never hedge if your team is physically dominating the pitch." },
                es: { topic: "GESTIÓN EMERGENCIA", phrase: "COBERTURA DE RIESGO EN VIVO", lesson: "🎯 <b>CONCEPTO CLAVE:</b> 'Hedging'. Maniobra defensiva para limitar daños cuando el partido va mal.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Apostaste 100€ al Inter. Pierde 1-0.<br><div class='math-box'>Haces Lay parcial a cuota alta (ej. 5.00).</div>Aceptas perder -30€ para evitar la pérdida total de -100€.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Un barco parcheado llega a puerto. Uno hundido no.'</div>💡 <i>Pro Tip:</i> Cubre en vivo viendo el partido. No te cubras si tu equipo domina totalmente." },
                pt: { topic: "GESTÃO DE EMERGÊNCIA", phrase: "COBERTURA DE RISCO AO VIVO", lesson: "🎯 <b>CONCEITO CHAVE:</b> 'Hedging'. Manobra defensiva para limitar danos quando o jogo corre mal.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Apostou 100€ no Inter. Perde 1-0.<br><div class='math-box'>Faz Lay parcial a cota alta (ex. 5.00).</div>Aceita perder -30€ para evitar a perda total de -100€.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Um barco remendado chega ao porto. Um afundado não.'</div>💡 <i>Pro Tip:</i> Cubra ao vivo vendo o jogo. Não se cubra se a sua equipa dominar totalmente." }
            },
            { 
                id: 25, 
                it: { topic: "STRUMENTI AVANZATI", phrase: "ANALISI TECNICA DEI GRAFICI", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Le quote non sono solo numeri, ma storie di comportamenti umani. I grafici mostrano resistenze, supporti e panico.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Un grafico a forma di 'scalino' improvviso indica un evento chiave (Gol/Rosso).<br><div class='math-box'>Una discesa lenta a 45° indica 'Decadimento Temporale' (Time Decay).</div>Punta sempre in direzione del decadimento naturale per scalping sicuri.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Le quote parlano: impara a leggerne i disegni.'</div>💡 <i>Pro Tip:</i> Esamina i grafici Betfair: se il volume abbinato è a campana su una quota, quel prezzo è il reale 'fair value' del mercato." },
                en: { topic: "ADVANCED TOOLS", phrase: "TECHNICAL CHART ANALYSIS", lesson: "🎯 <b>KEY CONCEPT:</b> Odds aren't just numbers; they are human behavior stories. Charts show resistance, support, and panic.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>A sudden 'cliff' shape indicates a key event (Goal/Red card).<br><div class='math-box'>A slow 45° slope indicates Time Decay.</div>Always trade in the direction of natural time decay for safe scalps.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Odds talk: learn to read their drawings.'</div>💡 <i>Pro Tip:</i> Check Betfair charts: if matched volume forms a bell curve at an odd, that price is the true 'fair value'." },
                es: { topic: "HERRAMIENTAS", phrase: "ANALISIS TECNICO DE GRAFICOS", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Las cuotas son historias de comportamiento. Los gráficos muestran soporte, resistencia y pánico.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Un 'escalón' brusco indica evento clave (Gol/Roja).<br><div class='math-box'>Bajada lenta a 45° = Decaimiento de Tiempo (Time Decay).</div>Opera a favor del decaimiento para scalping seguro.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Las cuotas hablan: aprende a leer sus dibujos.'</div>💡 <i>Pro Tip:</i> En gráficos Betfair, si el volumen forma una campana, ese precio es el valor real." },
                pt: { topic: "FERRAMENTAS", phrase: "ANALISE TECNICA DE GRAFICOS", lesson: "🎯 <b>CONCEITO CHAVE:</b> As cotas são histórias de comportamento. Os gráficos mostram suporte, resistência e pânico.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Um 'degrau' brusco indica evento chave (Golo/Vermelho).<br><div class='math-box'>Descida lenta a 45° = Decaimento de Tempo (Time Decay).</div>Opere a favor do decaimento para scalping seguro.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'As cotas falam: aprenda a ler os seus desenhos.'</div>💡 <i>Pro Tip:</i> Em gráficos Betfair, se o volume forma uma campana, esse preço é o valor real." }
            },
            { 
                id: 26, 
                it: { topic: "PSICOLOGIA", phrase: "CONTROLLO DELLA MENTE DEL TRADER", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Il vero campo di battaglia non è Betfair, è il tuo cervello. Avidità e Paura sono i due nemici mortali.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Trader Robot: Chiude a +15€ o -15€ senza emozioni. Profilo +150€ a fine mese.<br><div class='math-box'>Trader Emotivo: Vince 30€, si esalta, ne punta 200€ e azzera il conto.</div>Il trading sportivo è 10% matematica e 90% psicologia.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Agisci come una macchina, calcola come un ragioniere.'</div>💡 <i>Pro Tip:</i> Se esulti sguaiatamente per una vincita, sei in pericolo. Le vincite devono essere noiose routine amministrative." },
                en: { topic: "PSYCHOLOGY", phrase: "TRADER MINDSET AND CONTROL", lesson: "🎯 <b>KEY CONCEPT:</b> The real battlefield isn't Betfair; it's your brain. Greed and Fear are the mortal enemies.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Robot Trader: Closes at +15€ or -15€ emotionless. +150€ end of month.<br><div class='math-box'>Emotional Trader: Wins 30€, gets hyped, bets 200€, blows account.</div>Sports trading is 10% math, 90% psychology.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Act like a machine, calculate like an accountant.'</div>💡 <i>Pro Tip:</i> If you cheer wildly for a win, you're in danger. Wins should be boring administrative routines." },
                es: { topic: "PSICOLOGÍA", phrase: "CONTROL DE LA MENTE DEL TRADER", lesson: "🎯 <b>CONCEPTO CLAVE:</b> El campo de batalla real no es Betfair, es tu cerebro. Codicia y Miedo son enemigos.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Trader Robot: Cierra a +15€ o -15€ sin emoción. +150€ a fin de mes.<br><div class='math-box'>Trader Emocional: Gana 30€, se emociona, apuesta 200€, quiebra.</div>El trading es 10% mates, 90% psicología.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Actúa como máquina, calcula como contable.'</div>💡 <i>Pro Tip:</i> Si celebras a gritos una ganancia, estás en peligro. Deben ser rutina aburrida." },
                pt: { topic: "PSICOLOGIA", phrase: "CONTROLO DA MENTE DO TRADER", lesson: "🎯 <b>CONCEITO CHAVE:</b> O campo de batalha real não é a Betfair, é o seu cérebro. Ganância e Medo são inimigos.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Trader Robot: Fecha a +15€ ou -15€ sem emoção. +150€ ao fim do mês.<br><div class='math-box'>Trader Emocional: Ganha 30€, empolga-se, aposta 200€, quebra.</div>O trading é 10% matemática, 90% psicologia.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Atue como máquina, calcule como contabilista.'</div>💡 <i>Pro Tip:</i> Se celebra aos gritos um lucro, está em perigo. Devem ser rotina aborrecida." }
            },
            { 
                id: 27, 
                it: { topic: "IL SEGRETO", phrase: "DISCIPLINA E TANTA PAZIENZA", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Non sei obbligato a operare tutti i giorni. I professionisti aspettano il momento perfetto, come un cecchino.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Fare 1 solo trade eccellente a settimana da +50€...<br><div class='math-box'>...è infinitamente meglio di 50 trade frenetici per chiudere a 0€.</div>Over-trading (scambiare troppo) brucia capitali in spread e commissioni.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Nessuna operazione è, a volte, la migliore operazione possibile.'</div>💡 <i>Pro Tip:</i> Seleziona massimo 1-2 partite al giorno. Ignora le notifiche frenetiche da campionati esotici che non conosci." },
                en: { topic: "THE SECRET", phrase: "DISCIPLINE AND LOTS OF PATIENCE", lesson: "🎯 <b>KEY CONCEPT:</b> You aren't forced to trade daily. Pros wait for the perfect moment, like a sniper.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Taking 1 excellent trade a week for +50€...<br><div class='math-box'>...is infinitely better than 50 frantic trades to end at 0€.</div>Over-trading burns capital in spread and fees.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'No trade is, sometimes, the best possible trade.'</div>💡 <i>Pro Tip:</i> Pick max 1-2 matches daily. Ignore frantic notifications from exotic leagues you don't know." },
                es: { topic: "EL SECRETO", phrase: "DISCIPLINA Y MUCHA PACIENCIA", lesson: "🎯 <b>CONCEPTO CLAVE:</b> No es obligatorio operar a diario. Los pros esperan el momento perfecto, como francotiradores.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Hacer 1 trade excelente semanal de +50€...<br><div class='math-box'>...es mejor que 50 trades frenéticos para acabar a 0€.</div>Sobre-operar quema capital en spreads y comisiones.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'No operar es, a veces, la mejor operación.'</div>💡 <i>Pro Tip:</i> Elige 1-2 partidos al día máximo. Ignora alertas de ligas raras que no conoces." },
                pt: { topic: "O SEGREDO", phrase: "DISCIPLINA E MUITA PACIENCIA", lesson: "🎯 <b>CONCEITO CHAVE:</b> Não é obrigatório operar diariamente. Os prós esperam o momento perfeito, como atiradores.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Fazer 1 trade excelente semanal de +50€...<br><div class='math-box'>...é melhor que 50 trades frenéticos para acabar a 0€.</div>Sobre-operar queima capital em spreads e comissões.</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Não operar é, às vezes, a melhor operação.'</div>💡 <i>Pro Tip:</i> Escolha 1-2 jogos ao dia no máximo. Ignore alertas de ligas estranhas que não conhece." }
            },
            { 
                id: 28, 
                it: { topic: "ENTRATA PERFETTA", phrase: "SCEGLIERE IL PUNTO DI INGRESSO", lesson: "🎯 <b>CONCETTO CHIAVE:</b> Entrare al giusto prezzo fa l'80% del lavoro. Non cliccare 'Punta' solo perché una squadra attacca.<br><br><div class='highlight-box'>🧮 <b>LA MATEMATICA:</b><br>Puntare la favorita a quota 1.15 è un rischio matematicamente tossico.<br><div class='math-box'>Devi vincere 7 volte di fila solo per pareggiare 1 perdita.</div>Aspetta che il tempo alzi la quota almeno a 1.50 (Value Bet).</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Il timing batte l'istinto, sempre.'</div>💡 <i>Pro Tip:</i> Usa lo scalping sui mercati Under nei primi 10 minuti di gioco, le quote scendono più rapidamente e offrono ottimi punti di ingresso." },
                en: { topic: "PERFECT ENTRY", phrase: "CHOOSING THE ENTRY POINT", lesson: "🎯 <b>KEY CONCEPT:</b> Entering at the right price is 80% of the job. Don't hit 'Back' just because a team attacks.<br><br><div class='highlight-box'>🧮 <b>THE MATH:</b><br>Backing the favorite at 1.15 is mathematically toxic risk.<br><div class='math-box'>You must win 7 times in a row just to cover 1 loss.</div>Wait for time decay to raise odds to at least 1.50 (Value Bet).</div><div class='memo-box'>🧠 <b>MEMO:</b> 'Timing beats instinct, always.'</div>💡 <i>Pro Tip:</i> Scalp Under markets in the first 10 minutes; odds drop faster and offer great entries." },
                es: { topic: "ENTRADA PERFECTA", phrase: "ELEGIR EL PUNTO DE INGRESO", lesson: "🎯 <b>CONCEPTO CLAVE:</b> Entrar al precio correcto es el 80% del trabajo. No cliques 'Back' solo porque ataquen.<br><br><div class='highlight-box'>🧮 <b>LA MATEMÁTICA:</b><br>Apostar al favorito a 1.15 es riesgo tóxico.<br><div class='math-box'>Debes ganar 7 veces seguidas para cubrir 1 pérdida.</div>Espera que el tiempo suba la cuota a 1.50 (Value Bet).</div><div class='memo-box'>🧠 <b>MEMO:</b> 'El timing vence al instinto, siempre.'</div>💡 <i>Pro Tip:</i> Haz scalping en mercados Under en los primeros 10 min; las cuotas caen rápido." },
                pt: { topic: "ENTRADA PERFEITA", phrase: "ESCOLHER O PONTO DE INGRESSO", lesson: "🎯 <b>CONCEITO CHAVE:</b> Entrar ao preço certo é 80% do trabalho. Não clique 'Back' só porque atacam.<br><br><div class='highlight-box'>🧮 <b>A MATEMÁTICA:</b><br>Apostar no favorito a 1.15 é risco tóxico.<br><div class='math-box'>Deve ganhar 7 vezes seguidas para cobrir 1 perda.</div>Espere que o tempo suba a cota a 1.50 (Value Bet).</div><div class='memo-box'>🧠 <b>MEMO:</b> 'O timing vence o instinto, sempre.'</div>💡 <i>Pro Tip:</i> Faça scalping em mercados Under nos primeiros 10 min; as cotas caem rápido." }
            },
            { 
                id: 29,

                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    osc.connect(gain); gain.connect(ctx.destination);

            {

            {

                es: { topic: "CROSS MATCH", phrase: "LÓGICA MOTOR", explanation: "Lección: Cruce de mercados. Ejemplo: Lay al Under 2.5 se iguala matemáticamente con el Back al Over 2.5." },
                pt: { topic: "CROSS MATCH", phrase: "LÓGICA MOTOR", explanation: "Lição: Cruzamento de mercados. Exemplo: Lay ao Under 2.5 é correspondido matematicamente com Back ao Over 2.5." }
            },
            {

                en: { topic: "VALUE BET", phrase: "MATH EDGE", explanation: "Lesson: Odds higher than reality. Example: If true probability is 50% (2.00) but exchange offers 2.10, you have an edge." },

                es: { topic: "VALOR", phrase: "VENTAJA MATEMÁTICA", explanation: "Lección: Cuota superior a realidad. Ejemplo: Si la probabilidad es 50% (2.00) y ofrecen 2.10, tienes ventaja." },
                pt: { topic: "VALOR", phrase: "VANTAGEM MATEMÁTICA", explanation: "Lição: Odd superior à realidade. Exemplo: Se a probabilidade é 50% (2.00) e oferecem 2.10, tem vantagem." }
            },
            {

                es: { topic: "OVERROUND", phrase: "MARGEN CASA", explanation: "Lección: Eficiencia. Ejemplo: Casas clásicas al 110% (caro). Exchanges cerca del 100% (barato)." },
                pt: { topic: "OVERROUND", phrase: "MARGEM CASA", explanation: "Lição: Eficiência. Exemplo: Casas clássicas a 110% (caro). Exchanges perto de 100% (barato)." }
            },
            {
                id: 28,

                es: { topic: "ARBITRAJE", phrase: "SIN RIESGO", explanation: "Lección: Ganancia segura por precio. Ejemplo: Back a 2.10 en Casa, Lay a 2.00 en Exchange." },
                pt: { topic: "ARBITRAGEM", phrase: "SEM RISCO", explanation: "Lição: Lucro seguro por preço. Exemplo: Back a 2.10 em Casa, Lay a 2.00 em Exchange." }
            },
            {

                es: { topic: "PLAN TRADING", phrase: "PREPARACIÓN", explanation: "Lección: Reglas previas. Ejemplo: Decidir arriesgar solo el 2% y salir en el minuto 70 pase lo que pase." },
                pt: { topic: "PLANO TRADING", phrase: "PREPARAÇÃO", explanation: "Lição: Regras prévias. Exemplo: Decidir arriscar apenas 2% e sair ao minuto 70 aconteça o que acontecer." }
            },
            {
                id: 30,
                en: { topic: "DISCIPLINE", phrase: "THE SECRET", explanation: "Lesson: Staying consistent. Example: Accepting a loss without chasing it. You are now a master of the Exchange!" },
                it: { topic: "DISCIPLINA", phrase: "IL SEGRETO", explanation: "Lezione: Essere costanti. Esempio: Accettare una perdita senza rincorrerla. Ora sei un Maestro dell'Exchange!" },
                es: { topic: "DISCIPLINA", phrase: "EL SECRETO", explanation: "Lección: Ser constante. Ejemplo: Aceptar una pérdida sin perseguirla. ¡Ya eres un Maestro del Exchange!" },
                pt: { topic: "DISCIPLINA", phrase: "O SEGREDO", explanation: "Lição: Ser constante. Exemplo: Aceitar uma perda sem a perseguir. Já é um Mestre do Exchange!" }

        const uiTranslations = {
            en: { title: "BETTING EXCHANGE ROOM", tagline: "Zero to Hero: 30 Days Course!", players1: "1 Player", players2: "2 Players", selectLesson: "Select Daily Topic", startGame: "Start Lesson", spinWheel: "Spin", buyVowel: "Vowel (250)", solve: "Solve", turnPrefix: "Player", turnSuffix: "'s Turn", bankrupt: "BANKRUPT!", loseTurn: "MISS TURN", consonantPrompt: "Odds Consonant:", vowelPrompt: "Choose Vowel", solvePrompt: "Solution:", submit: "Send", cancel: "Cancel", correct: "Correct!", wrong: "Wrong!", concept: "Lesson Recap:", nextRound: "Next Lesson", gameOver: "Graduated!", winner: "Top Trader", playAgain: "Restart", day: "Day", wheelValues: { BANKRUPT: "BANKRUPT", LOSE_TURN: "MISS TURN" } },
            it: { title: "BETTING EXCHANGE ROOM", tagline: "Zero to Hero: Corso in 30 Giorni!", players1: "1 Giocatore", players2: "2 Giocatori", selectLesson: "Seleziona Tema del Giorno", startGame: "Inizia Lezione", spinWheel: "Gira", buyVowel: "Vocale (250)", solve: "Risolvi", turnPrefix: "Tocca a P", turnSuffix: "!", bankrupt: "BANCAROTTA!", loseTurn: "PASSO", consonantPrompt: "Consonante a Quota:", vowelPrompt: "Scegli Vocale", solvePrompt: "Soluzione:", submit: "Invia", cancel: "Annulla", correct: "Esatto!", wrong: "Sbagliato!", concept: "Recap Lezione:", nextRound: "Prossima Lezione", gameOver: "Diplomato!", winner: "Top Trader", playAgain: "Ricomincia", day: "Giorno", wheelValues: { BANKRUPT: "BANCAROTTA", LOSE_TURN: "PASSO" } },
            es: { title: "BETTING EXCHANGE ROOM", tagline: "Zero to Hero: ¡Curso de 30 Días!", players1: "1 Jugador", players2: "2 Jugadores", selectLesson: "Elegir Tema del Día", startGame: "Iniciar Lección", spinWheel: "Girar", buyVowel: "Vocal (250)", solve: "Resolver", turnPrefix: "Turno de P", turnSuffix: "", bankrupt: "¡BANCARROTA!", loseTurn: "¡PASO!", consonantPrompt: "Consonante a Cuota:", vowelPrompt: "Elegir Vocal", solvePrompt: "Solución:", submit: "Enviar", cancel: "Cancelar", correct: "¡Correcto!", wrong: "¡Incorrecto!", concept: "Recap Lección:", nextRound: "Siguiente Tema", gameOver: "¡Graduado!", winner: "Top Trader", playAgain: "Reiniciar", day: "Día", wheelValues: { BANKRUPT: "BANCARROTA", LOSE_TURN: "PASO" } },
            pt: { title: "BETTING EXCHANGE ROOM", tagline: "Zero to Hero: Curso de 30 Dias!", players1: "1 Jogador", players2: "2 Jogadores", selectLesson: "Selecionar Tema do Dia", startGame: "Iniciar Lição", spinWheel: "Girar", buyVowel: "Vogal (250)", solve: "Resolver", turnPrefix: "Vez do P", turnSuffix: "", bankrupt: "FALÊNCIA!", loseTurn: "PASSO", consonantPrompt: "Consonante para Cota:", vowelPrompt: "Escolha Vogal", solvePrompt: "Solução:", submit: "Enviar", cancel: "Cancelar", correct: "Correto!", wrong: "Errado!", concept: "Recap Lição:", nextRound: "Próxima Lição", gameOver: "Diplomado!", winner: "Top Trader", playAgain: "Reiniciar", day: "Dia", wheelValues: { BANKRUPT: "FALÊNCIA", LOSE_TURN: "PASSO" } }
        };

        const WHEEL_SEGMENTS = [
            { type: 'value', val: '1.50', multiplier: 150, color: COLORS.backBlue, textColor: '#FFFFFF' },
            { type: 'value', val: '2.00', multiplier: 200, color: COLORS.layPink, textColor: '#000000' },
            { type: 'value', val: '3.50', multiplier: 350, color: COLORS.backBlue, textColor: '#FFFFFF' },
            { type: 'BANKRUPT', val: '0', multiplier: 0, color: '#000000', textColor: '#EF4444' },
            { type: 'value', val: '1.20', multiplier: 120, color: COLORS.layPink, textColor: '#000000' },
            { type: 'value', val: '5.00', multiplier: 500, color: COLORS.backBlue, textColor: '#FFFFFF' },
            { type: 'value', val: '2.50', multiplier: 250, color: COLORS.layPink, textColor: '#000000' },
            { type: 'LOSE_TURN', val: '0', multiplier: 0, color: '#FFFFFF', textColor: '#000000' },
            { type: 'value', val: '4.00', multiplier: 400, color: COLORS.backBlue, textColor: '#FFFFFF' },
            { type: 'value', val: '10.0', multiplier: 1000, color: COLORS.layPink, textColor: '#000000' },
            { type: 'value', val: '1.80', multiplier: 180, color: COLORS.backBlue, textColor: '#FFFFFF' },
            { type: 'value', val: '6.00', multiplier: 600, color: COLORS.layPink, textColor: '#000000' }
        ];

        const flagImages = { en: 'https://flagcdn.com/w80/gb.png', it: 'https://flagcdn.com/w80/it.png', es: 'https://flagcdn.com/w80/es.png', pt: 'https://flagcdn.com/w80/pt.png' };

        function App() {
            const [lang, setLang] = useState('it');
            const [gameState, setGameState] = useState('SETUP');
            const [numPlayers, setNumPlayers] = useState(1);
            const [startTopicIndex, setStartTopicIndex] = useState(0); 
            const [scores, setScores] = useState([0, 0]);
            const [currentPlayer, setCurrentPlayer] = useState(0);
            const [currentRoundIndex, setCurrentRoundIndex] = useState(0);
            const [phraseData, setPhraseData] = useState(null);
            const [guessedLetters, setGuessedLetters] = useState([]);
            const [turnPhase, setTurnPhase] = useState('IDLE');
            const [spinValue, setSpinValue] = useState(null);
            const [solveInput, setSolveInput] = useState('');
            const [modalMessage, setModalMessage] = useState(null);
            
            const wheelRef = useRef(null);
            const rotationRef = useRef(0);
            const audioCtxRef = useRef(null);

            const ui = uiTranslations[lang];

            useEffect(() => {
                const ls = document.getElementById('loading-screen');
                if (ls) ls.style.opacity = '0', setTimeout(() => ls.remove(), 400);
            }, []);

            const initAudio = () => {
                if (!audioCtxRef.current) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtxRef.current = new AudioContext();
                }
                if (audioCtxRef.current?.state === 'suspended') audioCtxRef.current.resume();
            };

            const playTick = () => {
                if (!audioCtxRef.current || audioCtxRef.current.state !== 'running') return;
                try {
                    const osc = audioCtxRef.current.createOscillator();
                    const gain = audioCtxRef.current.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(300, audioCtxRef.current.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(50, audioCtxRef.current.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.2, audioCtxRef.current.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtxRef.current.currentTime + 0.05);
                    osc.connect(gain); gain.connect(audioCtxRef.current.destination);
                    osc.start(); osc.stop(audioCtxRef.current.currentTime + 0.05);
                } catch(e) {}
            };

            const startGame = () => {
                initAudio();
                setScores([0, 0]); setCurrentPlayer(0);
                setCurrentRoundIndex(startTopicIndex);
                startRound(startTopicIndex);
                setGameState('PLAYING');
            };

            const startRound = (index) => {
                if (index >= phrasesDictionary.length) return setGameState('GAME_OVER');
                const data = phrasesDictionary[index];
                setPhraseData({ topic: data[lang].topic, phrase: data[lang].phrase, explanation: data[lang].explanation, day: index + 1, originalData: data });
                setGuessedLetters([]); setTurnPhase('IDLE'); setSpinValue(null);
            };

            const spinWheel = () => {
                if (turnPhase !== 'IDLE') return;
                setTurnPhase('SPINNING'); initAudio();
                const segIdx = Math.floor(Math.random() * WHEEL_SEGMENTS.length);
                const segAngle = 360 / WHEEL_SEGMENTS.length;
                const targetRot = rotationRef.current + (360 * 4) + (360 - (segIdx * segAngle)) - (rotationRef.current % 360);
                const duration = 4000; const start = performance.now();
                let lastT = Math.floor(rotationRef.current / 30);

                const anim = (time) => {
                    const t = Math.min((time - start) / duration, 1);
                    const ease = 1 - Math.pow(1 - t, 4);
                    const curr = rotationRef.current + (targetRot - rotationRef.current) * ease;
                    if (wheelRef.current) wheelRef.current.style.transform = `rotate(${curr}deg) translateZ(0)`;
                    const ct = Math.floor(curr / 30);
                    if (ct > lastT) playTick(), lastT = ct;
                    if (t < 1) requestAnimationFrame(anim);
                    else {
                        rotationRef.current = curr;
                        const res = WHEEL_SEGMENTS[segIdx];
                        setSpinValue(res);
                        if (res.type === 'BANKRUPT') {
                            const ns = [...scores]; ns[currentPlayer] = 0; setScores(ns);
                            showTemporaryModal(ui.bankrupt, 'error'); setTimeout(nextTurn, 2000);
                        } else if (res.type === 'LOSE_TURN') {
                            showTemporaryModal(ui.loseTurn, 'error'); setTimeout(nextTurn, 2000);
                        } else setTurnPhase('WAITING_CONSONANT');
                    }
                };
                requestAnimationFrame(anim);
            };

            const handleLetterClick = (letter) => {
                if (guessedLetters.includes(letter)) return;
                const isV = ['A','E','I','O','U'].includes(letter);
                if (turnPhase === 'WAITING_CONSONANT' && isV) return;
                if (turnPhase === 'WAITING_VOWEL' && !isV) return;
                setGuessedLetters(p => [...p, letter]);
                const occ = phraseData.phrase.split('').filter(c => c === letter).length;
                if (occ > 0) {
                    if (turnPhase === 'WAITING_CONSONANT') {
                        const win = occ * spinValue.multiplier;
                        const ns = [...scores]; ns[currentPlayer] += win; setScores(ns);
                        showTemporaryModal(`+${win}`, 'success');
                    } else showTemporaryModal(ui.correct, 'success');
                    setTurnPhase('IDLE');
                    const allFound = phraseData.phrase.replace(/[^A-Z]/g, '').split('').every(l => [...guessedLetters, letter].includes(l));
                    if (allFound) setTimeout(() => setGameState('SOLVED'), 1000);
                } else {
                    showTemporaryModal(ui.wrong, 'error'); setTimeout(nextTurn, 1500);
                }
            };

            const nextTurn = () => { if (numPlayers > 1) setCurrentPlayer(p => p === 0 ? 1 : 0); setTurnPhase('IDLE'); };

            const showTemporaryModal = (text, type) => { setModalMessage({ text, type }); setTimeout(() => setModalMessage(null), 1500); };

            const handleNextRound = () => {
                const next = currentRoundIndex + 1;
                setCurrentRoundIndex(next); setScores([0,0]); setCurrentPlayer(0);
                startRound(next); setGameState('PLAYING');
            };

            const handleSolveSubmit = () => {
                if (solveInput.toUpperCase() === phraseData.phrase.toUpperCase()) {
                    setGuessedLetters('ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''));
                    showTemporaryModal(ui.correct, 'success');
                    setTimeout(() => setGameState('SOLVED'), 1500);
                } else {
                    showTemporaryModal(ui.wrong, 'error');
                    setTimeout(nextTurn, 1500);
                }
                setSolveInput('');
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="px-4 py-3 flex justify-between items-center border-b border-white/10 bg-black/60 backdrop-blur-md sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <img src="logo-tondo.jpeg" className="w-8 h-8 md:w-10 md:h-10 rounded-full" onError={e=>e.target.style.display='none'} />
                            <span className="text-[#FFB805] font-black text-sm sm:text-base md:text-lg tracking-widest uppercase line-clamp-1">{ui.title}</span>
                        </div>
                        {gameState !== 'SETUP' && (
                            <button onClick={() => setGameState('SETUP')} className="text-white/70 hover:text-white p-2 rounded-full bg-white/5"><Icon name="SettingsIcon" size={20}/></button>
                        )}
                    </header>

                    <main className="flex-1 flex flex-col items-center w-full max-w-7xl mx-auto pb-6 px-2 sm:px-4">
                        {gameState === 'SETUP' && (
                            <div className="flex flex-col items-center justify-center min-h-[70vh] w-full max-w-lg text-white p-6 sm:p-8 rounded-3xl bg-white/5 backdrop-blur-md border border-white/10 shadow-2xl animate-pop-in mx-auto my-6 relative overflow-hidden">
                                <img src="La-Ruota-della-Fortuna-2-1024x576.webp" className="w-full h-auto rounded-2xl border-4 border-[#2E9DDF] mb-6" />
                                <p className="text-center font-bold mb-6 text-white/90">{ui.tagline}</p>
                                <div className="flex gap-4 mb-8">
                                    {Object.keys(flagImages).map(l => (
                                        <button key={l} onClick={()=>setLang(l)} className={`w-12 h-12 rounded-full overflow-hidden border-2 transition-all ${lang===l?'border-[#FFB805] scale-110 shadow-lg':'opacity-50 hover:opacity-100'}`}>
                                            <img src={flagImages[l]} className="w-full h-full object-cover"/>
                                        </button>
                                    ))}
                                </div>
                                <div className="flex gap-3 w-full mb-6">
                                    <button onClick={()=>setNumPlayers(1)} className={`flex-1 p-4 rounded-2xl flex flex-col items-center gap-2 ${numPlayers===1?'bg-[#2E9DDF] border-2 border-blue-300':'bg-black/40'}`}><Icon name="User"/>{ui.players1}</button>
                                    <button onClick={()=>setNumPlayers(2)} className={`flex-1 p-4 rounded-2xl flex flex-col items-center gap-2 ${numPlayers===2?'bg-[#2E9DDF] border-2 border-blue-300':'bg-black/40'}`}><Icon name="Users"/>{ui.players2}</button>
                                </div>
                                <div className="w-full mb-8">
                                    <label className="block text-[10px] uppercase font-black mb-2 opacity-70 tracking-widest">{ui.selectLesson}</label>
                                    <div className="relative">
                                        <select value={startTopicIndex} onChange={e=>setStartTopicIndex(Number(e.target.value))} className="w-full p-4 pr-10 rounded-2xl bg-black/60 border-2 border-white/10 text-white font-bold outline-none appearance-none cursor-pointer text-sm">
                                            {phrasesDictionary.map((p,i)=><option key={i} value={i}>{ui.day} {i+1}: {p[lang].topic}</option>)}
                                        </select>
                                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-50"><Icon name="ChevronDown"/></div>
                                    </div>
                                </div>
                                <button onClick={startGame} className="w-full sm:w-auto px-10 py-5 bg-[#FFB805] text-black rounded-full font-black text-xl flex items-center justify-center gap-2 active:scale-95 shadow-xl"><Icon name="Play"/>{ui.startGame}</button>
                            </div>
                        )}

                        {(gameState === 'PLAYING' || gameState === 'SOLVED') && (
                            <div className="w-full flex flex-col items-center overflow-hidden">
                                <div className="flex justify-center gap-2 w-full mt-4 max-w-sm">
                                    {[...Array(numPlayers)].map((_, i) => (
                                        <div key={i} className={`flex-1 p-3 rounded-2xl border-2 text-center transition-all ${currentPlayer===i && gameState==='PLAYING'?'border-[#FFB805] bg-[#FFB805]/10 scale-105 shadow-md':'opacity-50'}`}>
                                            <div className="text-[10px] font-black uppercase text-white/60">{ui.player} {i+1}</div>
                                            <div className="text-2xl font-black text-white">{scores[i]}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="relative w-full max-w-5xl my-6 p-6 sm:p-10 pt-14 rounded-[2rem] border-[10px] border-gray-400 bg-[#0F2027] flex flex-col items-center shadow-2xl overflow-hidden">
                                    <div className="absolute top-0 left-1/2 -translate-x-1/2 bg-[#FFB805] text-black px-6 py-1.5 rounded-b-2xl font-black text-xs sm:text-lg shadow-lg z-10 tracking-widest">{ui.day} {phraseData.day}: {phraseData.topic}</div>
                                    <div className="flex flex-wrap justify-center gap-y-4 gap-x-8 sm:gap-x-12">
                                        {phraseData.phrase.split(' ').map((w, wi)=>(
                                            <div key={wi} className="flex gap-1.5 sm:gap-2.5">
                                                {w.split('').map((c, ci)=>(
                                                    <div key={ci} className={`w-7 h-10 sm:w-10 sm:h-14 md:w-12 md:h-16 flex items-center justify-center text-xl sm:text-3xl md:text-4xl font-black uppercase rounded bg-white border-2 border-gray-300 transition-all ${guessedLetters.includes(c)?'text-black':'text-transparent'}`}>{c}</div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {gameState==='PLAYING' && (
                                    <div className="flex flex-col lg:flex-row items-center gap-6 w-full max-w-5xl mb-4 px-2">
                                        <div className="relative w-full max-w-[280px] sm:max-w-[360px] md:max-w-[420px] aspect-square">
                                            <svg viewBox="0 0 400 400" className="w-full h-full overflow-visible drop-shadow-2xl">
                                                <circle cx="200" cy="200" r="195" fill="#111" stroke="#ccc" strokeWidth="8" />
                                                <g ref={wheelRef} style={{ transformOrigin: '200px 200px', willChange: 'transform' }}>
                                                    {WHEEL_SEGMENTS.map((s, i)=>{
                                                        const rot = i * (360/WHEEL_SEGMENTS.length) - 90;
                                                        const label = s.type==='value'?s.val:(ui.wheelValues[s.type]||s.type);
                                                        const isValue = s.type==='value';
                                                        const strokeWidthVal = isValue?'1.5':'0.5';
                                                        const xPos = label.length > 9 ? '378' : (label.length > 5 ? '372' : '365');
                                                        const fontSizeVal = isValue ? '36' : (label.length > 9 ? '14' : '16');
                                                        return (
                                                            <g key={i} transform={`rotate(${rot}, 200, 200)`}>
                                                                <path d="M 200 200 L 383.5 150.8 A 190 190 0 0 1 383.5 249.2 Z" fill={s.color} stroke="rgba(0,0,0,0.2)"/>
                                                                <text x={xPos} y="200" textAnchor="end" dominantBaseline="central" fill={s.textColor} fontSize={fontSizeVal} fontWeight="900" stroke={s.textColor==='#FFFFFF'?'#000':'#fff'} strokeWidth={strokeWidthVal} paintOrder="stroke fill" letterSpacing={isValue?"0":"1"}>{label}</text>
                                                                <circle cx="373.8" cy="246.5" r="4" fill="#eee" stroke="#333" strokeWidth="0.5"/>
                                                            </g>
                                                        )
                                                    })}
                                                    <circle cx="200" cy="200" r="35" fill="#FFB805" stroke="#333" strokeWidth="3" />
                                                    <image href="logo-tondo.jpeg" x="168" y="168" width="64" height="64" clipPath="circle(32px at 32px 32px)" />
                                                </g>
                                                <g style={{ transformOrigin: '200px 10px' }}>
                                                    <path d="M 185 5 L 215 5 L 200 45 Z" fill="#EF4444" stroke="#7F1D1D" strokeWidth="2" />
                                                </g>
                                            </svg>
                                        </div>

                                        <div className="w-full lg:w-1/3 bg-[#1A1A1A] p-6 rounded-2xl border border-white/10 text-center relative overflow-hidden flex flex-col justify-center min-h-[180px] sm:min-h-[220px] shadow-xl">
                                            {turnPhase === 'IDLE' ? (
                                                <div className="flex flex-col gap-3 animate-fade-in-up">
                                                    <h3 className="font-black text-[#FFB805] uppercase tracking-widest text-sm">{ui.turnPrefix} {currentPlayer+1}{ui.turnSuffix}</h3>
                                                    <button onClick={spinWheel} className="w-full py-4 bg-[#FFB805] text-black rounded-2xl font-black text-xl active:scale-95 shadow-md uppercase">{ui.spinWheel}</button>
                                                    <div className="flex gap-2">
                                                        <button onClick={()=>scores[currentPlayer]>=250 && (setScores(s=>{const n=[...s]; n[currentPlayer]-=250; return n;}), setTurnPhase('WAITING_VOWEL'), showTemporaryModal("-250",'info'))} disabled={scores[currentPlayer]<250} className={`flex-1 py-3 rounded-xl font-bold text-xs ${scores[currentPlayer]>=250?'bg-[#2E9DDF] text-white shadow-md':'bg-white/5 opacity-30 cursor-not-allowed'}`}>{ui.buyVowel}</button>
                                                        <button onClick={()=>setTurnPhase('SOLVING')} className="flex-1 py-3 bg-purple-600 rounded-xl font-bold text-xs text-white shadow-md">{ui.solve}</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center justify-center h-full">
                                                    {turnPhase==='SPINNING' && <div className="text-2xl font-black text-[#FFB805] animate-pulse tracking-widest">GIRANDO...</div>}
                                                    {turnPhase==='WAITING_CONSONANT' && spinValue && (
                                                        <div className="animate-fade-in-up">
                                                            <div className="text-[10px] opacity-60 uppercase mb-1">{ui.consonantPrompt}</div>
                                                            <div className="text-5xl font-black" style={{color: spinValue.color}}>{spinValue.val}</div>
                                                        </div>
                                                    )}
                                                    {turnPhase==='WAITING_VOWEL' && <div className="text-xl font-black text-[#2E9DDF] uppercase animate-fade-in-up">{ui.vowelPrompt}</div>}
                                                    {turnPhase==='SOLVING' && (
                                                        <div className="w-full animate-fade-in-up flex flex-col gap-3">
                                                            <input type="text" value={solveInput} onChange={e=>setSolveInput(e.target.value)} placeholder={ui.solvePrompt} className="w-full p-4 rounded-xl bg-white/5 border-2 border-white/20 text-white text-center font-black uppercase outline-none focus:border-[#FFB805]" />
                                                            <div className="flex gap-2">
                                                                <button onClick={()=>setTurnPhase('IDLE')} className="flex-1 py-3 bg-red-500/20 text-red-400 rounded-xl font-bold text-sm">{ui.cancel}</button>
                                                                <button onClick={handleSolveSubmit} className="flex-1 py-3 bg-[#00D166] text-black rounded-xl font-bold text-sm">{ui.submit}</button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                            {modalMessage && (
                                                <div className="absolute inset-0 z-50 bg-black/90 flex flex-col items-center justify-center p-4 animate-pop-in">
                                                    <Icon name={modalMessage.type==='success'?'CheckCircle':'AlertCircle'} size={50} className={modalMessage.type==='success'?'text-green-500':'text-red-500'} />
                                                    <div className="text-xl font-black uppercase text-center mt-2 text-white">{modalMessage.text}</div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {gameState==='PLAYING' && (
                                    <div className="w-full max-w-3xl bg-white/5 p-2 sm:p-4 rounded-2xl sm:rounded-[2rem] border border-white/10 mt-2 mb-8">
                                        <div className="flex flex-wrap justify-center gap-1 sm:gap-2">
                                            {'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l => {
                                                const isV = ['A','E','I','O','U'].includes(l);
                                                const disabled = guessedLetters.includes(l) || turnPhase==='IDLE' || turnPhase==='SPINNING' || (turnPhase==='WAITING_CONSONANT' && isV) || (turnPhase==='WAITING_VOWEL' && !isV);
                                                return (
                                                    <button key={l} disabled={disabled} onClick={()=>handleLetterClick(l)} className={`flex-grow-0 basis-[11.5%] sm:basis-0 sm:min-w-[44px] min-h-[44px] sm:min-h-[50px] rounded-lg sm:rounded-xl font-black text-base sm:text-xl transition-all ${disabled?'opacity-10':'bg-white/10 hover:bg-[#FFB805] hover:text-black shadow-lg active:scale-90'}`}>{l}</button>
                                                )
                                            })}
                                        </div>
                                    </div>
                                )}

                                {gameState==='SOLVED' && (
                                    <div className="w-full max-w-4xl bg-gradient-to-br from-[#0F2027] to-black p-6 sm:p-10 rounded-2xl sm:rounded-[3rem] border border-green-500/30 shadow-2xl animate-pop-in mt-2 mb-8">
                                        <div className="flex flex-col sm:flex-row items-center justify-between gap-6 border-b border-white/10 pb-6 mb-6">
                                            <div className="flex items-center gap-3 text-[#00D166]">
                                                <Icon name="CheckCircle" size={40}/>
                                                <h2 className="text-2xl sm:text-3xl font-black text-white uppercase">{ui.correct}</h2>
                                            </div>
                                            <button onClick={handleNextRound} className="w-full sm:w-auto px-10 py-4 bg-[#FFB805] text-black rounded-full font-black text-xl flex items-center justify-center gap-2 shadow-xl active:scale-95"><Icon name="Play"/>{ui.nextRound}</button>
                                        </div>
                                        <h3 className="text-[#FFB805] font-black uppercase text-xs tracking-widest mb-2">{ui.concept}</h3>
                                        <p className="text-white text-lg md:text-2xl leading-relaxed font-medium">{phraseData.explanation}</p>
                                    </div>
                                )}
                            </div>
                        )}

                        {gameState === 'GAME_OVER' && (
                            <div className="text-center text-white py-12 px-6 bg-white/5 rounded-3xl backdrop-blur-xl border border-white/10 mt-auto mb-auto animate-pop-in w-full max-w-md shadow-2xl">
                                <h2 className="text-4xl font-black text-[#FFB805] mb-8">{ui.gameOver}</h2>
                                <p className="text-2xl font-bold mb-8">🏆 {ui.winner}</p>
                                <button onClick={()=>setGameState('SETUP')} className="w-full py-4 bg-[#2E9DDF] rounded-full font-black text-xl flex items-center justify-center gap-2 active:scale-95 shadow-lg"><Icon name="RotateCcw"/>{ui.playAgain}</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

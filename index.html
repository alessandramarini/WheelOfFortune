        body {

            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
        }
        
        #loading-screen {
            position: fixed; inset: 0; background: #1A1A1A; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; transition: opacity 0.4s ease;
        }
        
        .loader {
            width: 40px; height: 40px; border: 4px solid #333; 
            border-top-color: #00D166; border-radius: 50%; 
            animation: spin 0.8s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.97); } 50% { transform: scale(1.01); } 100% { opacity: 1; transform: scale(1); } }
        
        @keyframes pulse-gentle {
            0%, 100% { transform: scale(1); box-shadow: 0 4px 0 #660000, 0 8px 15px rgba(0,0,0,0.5); }
            50% { transform: scale(1.06); box-shadow: 0 4px 20px rgba(255,77,77,0.4), 0 8px 25px rgba(0,0,0,0.6); }
        }

        .animate-fade-in-up { animation: fadeInUp 0.3s forwards; }
        .animate-pop-in { animation: popIn 0.4s forwards; }
        .animate-pulse-button { animation: pulse-gentle 2s infinite ease-in-out; }
        
        input[type="text"] { font-size: 16px !important; }
        button { touch-action: manipulation; }

        .viewport-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slot-button {
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #990000);
            transition: all 0.1s;
        }
        .slot-button:active {
            transform: translateY(3px) scale(0.95) !important;
            box-shadow: 0 1px 0 #660000, 0 2px 5px rgba(0,0,0,0.5) !important;
            animation: none;
        }

        @media (min-width: 1024px) {
            .main-content { overflow: hidden; }
        }
    </style>

            }, []);

            const initAudio = () => {
                if (!audioCtxRef.current) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) audioCtxRef.current = new AudioContext();
                }
                if (audioCtxRef.current?.state === 'suspended') audioCtxRef.current.resume();
            };

            const playTick = () => {
                if (!audioCtxRef.current || audioCtxRef.current.state !== 'running') return;
                try {
                    const osc = audioCtxRef.current.createOscillator();
                    const gain = audioCtxRef.current.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(300, audioCtxRef.current.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(50, audioCtxRef.current.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.15, audioCtxRef.current.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtxRef.current.currentTime + 0.05);
                    osc.connect(gain); gain.connect(audioCtxRef.current.destination);
                    osc.start(); osc.stop(audioCtxRef.current.currentTime + 0.05);
                } catch(e) {}
            };

            const startGame = () => {
                initAudio();
                setScores([0, 0]); setCurrentPlayer(0);
                setCurrentRoundIndex(startTopicIndex);
                startRound(startTopicIndex);
                setGameState('PLAYING');
            };

            const startRound = (index) => {
                if (index >= phrasesDictionary.length) return setGameState('GAME_OVER');
                const data = phrasesDictionary[index];
                const expl = explanations[lang]?.[data.explanation_key] || explanations['en']?.[data.explanation_key] || data[lang].topic;
                setPhraseData({ topic: data[lang].topic, phrase: data[lang].phrase, explanation: expl, day: index + 1, originalData: data });
                setGuessedLetters([]); setTurnPhase('IDLE'); setSpinValue(null);
            };

            const spinWheel = () => {
                if (turnPhase !== 'IDLE') return;
                setTurnPhase('SPINNING'); initAudio();
                const segIdx = Math.floor(Math.random() * WHEEL_SEGMENTS.length);
                const segAngle = 360 / WHEEL_SEGMENTS.length;
                const targetRot = rotationRef.current + (360 * 4) + (360 - (segIdx * segAngle)) - (rotationRef.current % 360);
                const duration = 4000; const start = performance.now();
                let lastT = Math.floor(rotationRef.current / 30);

                const anim = (time) => {
                    const t = Math.min((time - start) / duration, 1);
                    const ease = 1 - Math.pow(1 - t, 4);
                    const curr = rotationRef.current + (targetRot - rotationRef.current) * ease;
                    if (wheelRef.current) wheelRef.current.style.transform = `rotate(${curr}deg) translateZ(0)`;
                    const ct = Math.floor(curr / 30);
                    if (ct > lastT) playTick(), lastT = ct;
                    if (t < 1) requestAnimationFrame(anim);
                    else {
                        rotationRef.current = curr;
                        const res = WHEEL_SEGMENTS[segIdx];
                        setSpinValue(res);
                        
                        if (res.type === 'BANKRUPT') {
                            setTurnPhase('IDLE');
                            const ns = [...scores]; ns[currentPlayer] = 0; setScores(ns);
                            showTemporaryModal(ui.bankrupt, 'error'); setTimeout(nextTurn, 2000);
                        } else if (res.type === 'LOSE_TURN') {
                            setTurnPhase('IDLE');
                            showTemporaryModal(ui.loseTurn, 'error'); setTimeout(nextTurn, 2000);
                        } else {
                            setTurnPhase('WAITING_CONSONANT');
                        }
                    }
                };
                requestAnimationFrame(anim);
            };

            const buyVowel = () => {
                if (scores[currentPlayer] >= 250 && turnPhase === 'IDLE') {
                    setTurnPhase('WAITING_VOWEL');
                    const ns = [...scores];
                    ns[currentPlayer] -= 250;
                    setScores(ns);
                    showTemporaryModal("-250", 'info');
                }
            };

            const handleLetterClick = (letter) => {
                if (guessedLetters.includes(letter)) return;
                const isV = ['A','E','I','O','U'].includes(letter);
                if (turnPhase === 'WAITING_CONSONANT' && isV) return;
                if (turnPhase === 'WAITING_VOWEL' && !isV) return;
                setGuessedLetters(p => [...p, letter]);
                const occ = phraseData.phrase.split('').filter(c => c === letter).length;
                if (occ > 0) {
                    if (turnPhase === 'WAITING_CONSONANT') {
                        const win = occ * spinValue.multiplier;
                        const ns = [...scores]; ns[currentPlayer] += win; setScores(ns);
                        showTemporaryModal(`+${win}`, 'success');
                    } else showTemporaryModal(ui.correct, 'success');
                    setTurnPhase('IDLE');
                    const allFound = phraseData.phrase.replace(/[^A-Z]/g, '').split('').every(l => [...guessedLetters, letter].includes(l));
                    if (allFound) setTimeout(() => setGameState('SOLVED'), 1000);
                } else {
                    showTemporaryModal(ui.wrong, 'error'); setTimeout(nextTurn, 1500);
                }
            };

            const nextTurn = () => { if (numPlayers > 1) setCurrentPlayer(p => p === 0 ? 1 : 0); setTurnPhase('IDLE'); };

            const showTemporaryModal = (text, type) => { setModalMessage({ text, type }); setTimeout(() => setModalMessage(null), 1500); };

            const handleNextRound = () => {
                const next = currentRoundIndex + 1;
                setCurrentRoundIndex(next); setScores([0,0]); setCurrentPlayer(0);
                startRound(next); setGameState('PLAYING');
            };

            const handleSolveSubmit = () => {
                if (solveInput.toUpperCase() === phraseData.phrase.toUpperCase()) {
                    setGuessedLetters('ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''));
                    showTemporaryModal(ui.correct, 'success');
                    setTimeout(() => setGameState('SOLVED'), 1500);
                } else {
                    showTemporaryModal(ui.wrong, 'error');
                    setTimeout(nextTurn, 1500);
                }
                setSolveInput('');
            };

            return (
                <div className="viewport-container bg-[#1A1A1A]">
                    <header className="px-4 py-2 flex justify-between items-center border-b border-white/10 bg-black/60 backdrop-blur-md sticky top-0 z-50 h-[50px] sm:h-[60px]">
                        <div className="flex items-center gap-3">
                            <img src="logo-tondo.jpeg" className="w-7 h-7 sm:w-9 sm:h-9 rounded-full object-cover shadow-[0_0_10px_rgba(0,209,102,0.3)]" />
                            <span className="text-[#00D166] font-black text-xs sm:text-base tracking-widest uppercase">BETTING EXCHANGE ROOM</span>
                        </div>
                        {gameState !== 'SETUP' && (
                            <button onClick={() => setGameState('SETUP')} className="text-white/70 hover:text-white p-1 rounded-full bg-white/5"><Icon name="SettingsIcon" size={18}/></button>
                        )}
                    </header>

                    <main className="main-content px-2 h-full">
                        {gameState === 'SETUP' && (
                            <div className="flex flex-col items-center justify-center h-full w-full max-w-lg text-white p-4 sm:p-8 rounded-3xl bg-white/5 backdrop-blur-md border border-white/10 animate-pop-in mx-auto relative overflow-hidden my-auto max-h-[85vh]">
                                <div className="absolute top-[-50px] left-[-50px] w-40 h-40 bg-green-500/20 rounded-full blur-[80px]"></div>
                                <div className="absolute bottom-[-50px] right-[-50px] w-40 h-40 bg-blue-500/20 rounded-full blur-[80px]"></div>
                                
                                <h1 className="text-3xl sm:text-5xl font-black text-[#00D166] text-center mb-6 tracking-tighter italic drop-shadow-[0_2px_10px_rgba(0,209,102,0.3)]">ZERO TO HERO ACADEMY</h1>
                                
                                <div className="flex gap-3 mb-6">
                                    {Object.keys(flagImages).map(l => (
                                        <button key={l} onClick={()=>setLang(l)} className={`w-10 h-10 rounded-full overflow-hidden border-2 transition-all ${lang===l?'border-[#00D166] scale-110 shadow-lg':'opacity-40 hover:opacity-100'}`}>
                                            <img src={flagImages[l]} className="w-full h-full object-cover"/>
                                        </button>
                                    ))}
                                </div>
                                <div className="flex gap-2 w-full mb-4">
                                    <button onClick={()=>setNumPlayers(1)} className={`flex-1 p-3 rounded-xl flex flex-col items-center gap-1 text-xs ${numPlayers===1?'bg-[#2E9DDF] border-2 border-blue-300 shadow-md font-black text-white':'bg-black/40 font-bold opacity-60'}`}><Icon name="User" size={16}/>{ui.players1}</button>
                                    <button onClick={()=>setNumPlayers(2)} className={`flex-1 p-3 rounded-xl flex flex-col items-center gap-1 text-xs ${numPlayers===2?'bg-[#2E9DDF] border-2 border-blue-300 shadow-md font-black text-white':'bg-black/40 font-bold opacity-60'}`}><Icon name="Users" size={16}/>{ui.players2}</button>
                                </div>
                                <div className="w-full mb-6 text-center">
                                    <label className="block text-[10px] uppercase font-black mb-1 opacity-100 tracking-widest text-[#FFB805]">{ui.selectLesson}</label>
                                    <div className="relative">
                                        <select value={startTopicIndex} onChange={e=>setStartTopicIndex(Number(e.target.value))} className="w-full p-3 pr-10 rounded-xl bg-black border-2 border-white/20 text-white font-black outline-none appearance-none cursor-pointer text-xs">
                                            {phrasesDictionary.map((p,i)=><option key={i} value={i} className="text-black">{(i+1).toString().padStart(2, '0')} - {p[lang].topic}</option>)}
                                        </select>
                                        <div className="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none opacity-50"><Icon name="ChevronDown" size={16}/></div>
                                    </div>
                                </div>

                                <button 
                                    onClick={startGame} 
                                    className="w-20 h-20 sm:w-24 sm:h-24 rounded-full slot-button text-white font-black text-[10px] sm:text-xs flex flex-col items-center justify-center gap-1 active:scale-95 transition-all uppercase border-4 border-white/20 animate-pulse-button"
                                >
                                    <Icon name="Play" size={16} className="fill-current"/>
                                    {ui.startGame}
                                </button>
                            </div>
                        )}

                        {(gameState === 'PLAYING' || gameState === 'SOLVED') && (
                            <div className="w-full flex flex-col lg:flex-row gap-2 lg:gap-4 lg:h-full lg:max-h-full py-1 sm:py-2">
                                
                                <div className="lg:w-1/3 flex flex-col items-center justify-center gap-1.5 py-1 lg:h-full">
                                    <div className="relative w-full max-w-[180px] sm:max-w-[240px] lg:max-w-[360px] aspect-square">
                                        <svg viewBox="0 0 400 400" className="w-full h-full overflow-visible drop-shadow-2xl">
                                            <circle cx="200" cy="200" r="195" fill="#111" stroke="#ccc" strokeWidth="6" />
                                            <g ref={wheelRef} style={{ transformOrigin: '200px 200px', willChange: 'transform' }}>
                                                {WHEEL_SEGMENTS.map((s, i)=>{
                                                    const rot = i * (360/WHEEL_SEGMENTS.length) - 90;
                                                    const label = s.type==='value'?s.val:(ui.wheelValues[s.type]||s.type);
                                                    const isVal = s.type==='value';
                                                    const textStroke = s.textColor === '#FFFFFF' ? '#000' : '#fff';
                                                    const textStrokeWidth = isVal ? '1.2' : '0.5';
                                                    return (
                                                        <g key={i} transform={`rotate(${rot}, 200, 200)`}>
                                                            <path d="M 200 200 L 383.5 150.8 A 190 190 0 0 1 383.5 249.2 Z" fill={s.color} stroke="rgba(0,0,0,0.2)"/>
                                                            <text x={label.length>9?'378':'365'} y="200" textAnchor="end" dominantBaseline="central" fill={s.textColor} fontSize={isVal?'32': (label.length > 9 ? '12' : '15')} fontWeight="900" stroke={textStroke} strokeWidth={textStrokeWidth} paintOrder="stroke fill" letterSpacing={isVal?"0":"1"}>{label}</text>
                                                            <circle cx="373.8" cy="246.5" r="3.5" fill="#eee" stroke="#333" strokeWidth="0.5"/>
                                                        </g>
                                                    )
                                                })}
                                                <circle cx="200" cy="200" r="30" fill="#FFB805" stroke="#333" strokeWidth="2" />
                                                <image href="logo-tondo.jpeg" x="172" y="172" width="56" height="56" clipPath="circle(28px at 28px 28px)" />
                                            </g>
                                            <g style={{ transformOrigin: '200px 10px' }}>
                                                <path d="M 188 5 L 212 5 L 200 40 Z" fill="#EF4444" stroke="#7F1D1D" strokeWidth="2" />
                                            </g>
                                        </svg>
                                    </div>

                                    {gameState==='PLAYING' && (
                                        <div className="w-full max-w-sm bg-[#1A1A1A] p-2 rounded-xl border border-white/10 text-center relative overflow-hidden shadow-lg min-h-[110px] flex flex-col justify-center">
                                            {turnPhase === 'IDLE' ? (
                                                <div className="flex flex-col gap-1.5 animate-fade-in-up items-center">
                                                    <h3 className="font-black text-[#FFB805] uppercase tracking-widest text-[9px] flex items-center gap-1 drop-shadow-md">
                                                        <Icon name="User" size={12}/> {ui.turnPrefix}{currentPlayer+1}
                                                    </h3>
                                                    
                                                    <button onClick={spinWheel} className="w-16 h-16 sm:w-20 sm:h-20 rounded-full slot-button flex items-center justify-center text-white font-black text-[10px] sm:text-xs uppercase border-4 border-white/10 animate-pulse-button drop-shadow-lg">
                                                        {ui.spinWheel}
                                                    </button>

                                                    <div className="flex gap-2 w-full mt-1 px-1">
                                                        <button 
                                                            onClick={buyVowel} 
                                                            disabled={scores[currentPlayer]<250} 
                                                            className={`flex-1 py-2 rounded-lg font-black text-[10px] sm:text-xs transition-all ${scores[currentPlayer]>=250?'bg-[#2E9DDF] text-black shadow-[0_3px_0_#1181B1]':'bg-white/10 text-white/40 cursor-not-allowed'}`}
                                                        >
                                                            {ui.buyVowel}
                                                        </button>
                                                        <button onClick={()=>setTurnPhase('SOLVING')} className="flex-1 py-2 bg-purple-600 rounded-lg font-black text-[10px] sm:text-xs text-white shadow-[0_3px_0_#4c1d95] drop-shadow-md">
                                                            {ui.solve}
                                                        </button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col items-center justify-center h-full">
                                                    {turnPhase==='SPINNING' && <div className="text-sm font-black text-[#FFB805] animate-pulse uppercase tracking-widest drop-shadow-md">GIRANDO...</div>}
                                                    {turnPhase==='WAITING_CONSONANT' && spinValue && (
                                                        <div className="animate-fade-in-up">
                                                            <div className="text-[9px] font-black text-white uppercase mb-0.5 drop-shadow-lg bg-black/40 px-2 py-0.5 rounded-full">{ui.consonantPrompt}</div>
                                                            <div className="text-xl font-black" style={{color: spinValue.color}}>{spinValue.val}</div>
                                                        </div>
                                                    )}
                                                    {turnPhase==='WAITING_VOWEL' && <div className="text-sm font-black text-[#2E9DDF] uppercase animate-fade-in-up drop-shadow-md bg-black/50 px-3 py-1 rounded-full">{ui.vowelPrompt}</div>}
                                                    {turnPhase==='SOLVING' && (
                                                        <div className="w-full animate-fade-in-up flex flex-col gap-1.5">
                                                            <input type="text" value={solveInput} onChange={e=>setSolveInput(e.target.value)} placeholder={ui.solvePrompt} className="w-full p-1.5 rounded-lg bg-white/5 border border-white/20 text-white text-center font-black uppercase outline-none focus:border-[#FFB805] text-xs" />
                                                            <div className="flex gap-2">
                                                                <button onClick={()=>setTurnPhase('IDLE')} className="flex-1 py-1 bg-red-500/20 text-red-400 rounded-lg font-bold text-[8px]">{ui.cancel}</button>
                                                                <button onClick={handleSolveSubmit} className="flex-1 py-1 bg-[#00D166] text-black rounded-lg font-bold text-[8px]">{ui.submit}</button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                            {modalMessage && (
                                                <div className="absolute inset-0 z-50 bg-black/95 flex flex-col items-center justify-center p-2 animate-pop-in">
                                                    <Icon name={modalMessage.type==='success'?'CheckCircle':'AlertCircle'} size={24} className={modalMessage.type==='success'?'text-green-400':'text-red-500'} />
                                                    <div className="text-[10px] font-black uppercase text-center mt-1 text-white drop-shadow-md">{modalMessage.text}</div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <div className="lg:w-2/3 flex flex-col justify-between py-1 lg:h-full overflow-hidden">
                                    <div className="flex justify-center gap-2 w-full max-w-xs mx-auto mb-1">
                                        {[...Array(numPlayers)].map((_, i) => (
                                            <div key={i} className={`flex-1 p-1 rounded-xl border-2 text-center transition-all ${currentPlayer===i && gameState==='PLAYING'?'border-[#FFB805] bg-[#FFB805]/10 scale-105 shadow-sm':'opacity-30 border-white/5 bg-black/40'}`}>
                                                <div className="text-[7px] font-black uppercase text-white/60 flex items-center justify-center gap-1">
                                                    <Icon name="User" size={10}/> {i + 1}
                                                </div>
                                                <div className="text-base font-black text-white drop-shadow-sm">{scores[i]}</div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="flex flex-col items-center gap-1.5 w-full mb-1">
                                        <div className="bg-black/90 px-5 py-1.5 rounded-full font-black text-[10px] sm:text-xs shadow-[0_2px_10px_rgba(0,0,0,0.5)] border border-white/10 flex gap-2">
                                            <span className="text-[#00D166]">{phraseData.day}</span>
                                            <span className="text-[#FFB805] uppercase tracking-widest">{phraseData.topic}</span>
                                        </div>
                                        <div className="relative w-full p-2 sm:p-4 rounded-[1.2rem] border-[4px] border-gray-400 bg-[#0F2027] flex flex-col items-center shadow-xl overflow-hidden min-h-[100px] sm:min-h-[140px] justify-center">
                                            <div className="flex flex-wrap justify-center gap-y-2 gap-x-4 sm:gap-x-6">
                                                {phraseData.phrase.split(' ').map((w, wi)=>(
                                                    <div key={wi} className="flex gap-1">
                                                        {w.split('').map((c, ci)=>(
                                                            <div key={ci} className={`w-5 h-7 sm:w-7 sm:h-10 md:w-9 md:h-12 flex items-center justify-center text-xs sm:text-lg font-black uppercase rounded bg-white border border-gray-300 transition-all shadow-sm ${guessedLetters.includes(c)?'text-black':'text-transparent'}`}>{c}</div>
                                                        ))}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {gameState==='PLAYING' && (
                                        <div className="w-full bg-black/60 p-1.5 rounded-xl border border-white/5 mb-1 shadow-inner">
                                            <div className="flex flex-wrap justify-center gap-1">
                                                {'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map(l => {
                                                    const isV = ['A','E','I','O','U'].includes(l);
                                                    const isGuessed = guessedLetters.includes(l);
                                                    const disabled = turnPhase==='IDLE' || turnPhase==='SPINNING' || (turnPhase==='WAITING_CONSONANT' && isV) || (turnPhase==='WAITING_VOWEL' && !isV);
                                                    
                                                    let btnClass = "flex-grow-0 basis-[11.5%] lg:basis-[7.5%] h-8 sm:h-10 rounded-lg font-black text-[11px] sm:text-sm transition-all shadow-md ";
                                                    
                                                    if (isGuessed) {
                                                        const inPhrase = phraseData.phrase.includes(l);
                                                        btnClass += inPhrase 
                                                            ? "bg-gray-800 text-white/40 cursor-not-allowed opacity-100" 
                                                            : "bg-red-950/20 text-red-500 border border-red-900/30 cursor-not-allowed opacity-100";
                                                    } else if (disabled) {
                                                        btnClass += "bg-white/5 text-white/20 cursor-not-allowed opacity-40";
                                                    } else {
                                                        btnClass += "bg-[#00D166] text-black hover:bg-[#00ff7f] active:scale-90 opacity-100";
                                                    }

                                                    return (
                                                        <button 
                                                            key={l} 
                                                            disabled={disabled || isGuessed} 
                                                            onClick={()=>handleLetterClick(l)} 
                                                            className={btnClass}
                                                        >
                                                            {l}
                                                        </button>
                                                    )
                                                })}
                                            </div>
                                        </div>
                                    )}

                                    {gameState==='SOLVED' && (
                                        <div className="w-full bg-gradient-to-br from-[#0F2027] to-black p-3 rounded-[1.2rem] border border-green-500/30 shadow-xl animate-pop-in mb-2 overflow-y-auto max-h-[120px]">
                                            <div className="flex items-center justify-between gap-2 mb-1">
                                                <div className="flex items-center gap-1 text-[#00D166]">
                                                    <Icon name="CheckCircle" size={18}/>
                                                    <h2 className="text-xs font-black text-white uppercase">{ui.correct}</h2>
                                                </div>
                                                <button onClick={handleNextRound} className="px-4 py-1.5 bg-[#FFB805] text-black rounded-full font-black text-[9px] flex items-center justify-center gap-1 shadow-md active:scale-95 transition-transform hover:scale-105"><Icon name="Play" size={12}/>{ui.nextRound}</button>
                                            </div>
                                            <h3 className="text-[#FFB805] font-black uppercase text-[7px] tracking-widest mb-0.5">{ui.concept}</h3>
                                            <p className="text-white text-[10px] sm:text-[11px] leading-tight opacity-90">{phraseData.explanation}</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {gameState === 'GAME_OVER' && (
                            <div className="text-center text-white py-6 px-6 bg-white/5 rounded-3xl backdrop-blur-xl border border-white/10 mt-auto mb-auto animate-pop-in w-full max-w-sm shadow-2xl">
                                <h2 className="text-xl font-black text-[#FFB805] mb-4">{ui.gameOver}</h2>
                                <p className="text-base font-bold mb-4">🏆 {ui.winner}</p>
                                <button onClick={()=>setGameState('SETUP')} className="w-full py-2 bg-[#2E9DDF] rounded-full font-black text-sm flex items-center justify-center gap-2 active:scale-95 shadow-lg"><Icon name="RotateCcw" size={16}/>{ui.playAgain}</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
